name: Daily Trend Scout

on:
  schedule:
    # 5 AM PST (13:00 UTC) — runs before content-engine (6AM/9AM PST)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  discover-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily trend scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 << 'PYEOF'
          import sys
          import json
          import os
          import time
          from datetime import datetime, timezone

          sys.path.insert(0, '.')

          try:
              from database.supabase_client import get_supabase_client
              from video_automation.daily_trend_scout import run_daily_trend_scout
          except ImportError as e:
              print(f"ERROR: Import failed - {e}")
              sys.exit(1)

          MAX_ATTEMPTS = 3
          last_error = None
          results = None

          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  print(f"=== Trend scout attempt {attempt}/{MAX_ATTEMPTS} ===")
                  db = get_supabase_client()
                  results = run_daily_trend_scout(db.client)
                  print("Trend scout completed successfully.")
                  break
              except Exception as e:
                  last_error = e
                  print(f"Attempt {attempt} failed: {e}")
                  if attempt < MAX_ATTEMPTS:
                      wait = 30 * attempt
                      print(f"Retrying in {wait}s...")
                      time.sleep(wait)

          if results is None:
              print(f"All {MAX_ATTEMPTS} attempts failed. Last: {last_error}")
              print("Content engine will fall back to static keyword lists today.")
              sys.exit(0)

          summary_lines = ["# Daily Trend Scout Results\n"]
          for brand, data in results.items():
              summary_lines.append(f"## {brand.upper()}")
              topics = data.get('topics', [])
              if topics:
                  for t in topics:
                      rank = t.get('rank', '?')
                      topic = t.get('topic', '?')
                      score = t.get('trend_score', '?')
                      summary_lines.append(f"- #{rank} {topic} (score: {score})")
              else:
                  summary_lines.append("- No trends discovered (content engine uses static fallback)")
              summary_lines.append("")

          summary = "\n".join(summary_lines)
          print(summary)

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary)
          PYEOF
