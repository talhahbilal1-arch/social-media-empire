name: PilotTools Twitter Automation

on:
  schedule:
    # 5PM UTC (9AM PST), 9PM UTC (1PM PST), 2AM UTC (6PM PST)
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Tweet type: tip, comparison, thread, or auto'
        required: false
        default: 'auto'
      count:
        description: 'Number of tweets to post (1-3)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  post-twitter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ai-tools-hub

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-tools-hub/package-lock.json

      - run: npm ci

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWEET_TYPE: ${{ github.event.inputs.type || 'auto' }}
          TWEET_COUNT: ${{ github.event.inputs.count || '1' }}
        run: node scripts/twitter-poster.js --type "$TWEET_TYPE" --count "$TWEET_COUNT"
        continue-on-error: true

      - name: Commit history
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-tools-hub/config/twitter-history.json
          git diff --staged --quiet || git commit -m "twitter: auto-post $(date +%Y-%m-%d-%H%M)"
          git pull --rebase --autostash origin main
          git push
