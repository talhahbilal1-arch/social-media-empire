# Daily Report Agent
# Runs once daily at 7:00 AM UTC to send summary email

name: Daily Report

on:
  schedule:
    # 7:00 AM UTC daily (after overnight agents complete)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
  ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
  ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Report
        run: |
          python -m agents.daily_report
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          echo "## Daily Report Sent" >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
