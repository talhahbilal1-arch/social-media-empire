name: Pin Catch-Up Burst

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pin-catchup-burst.yml'

permissions:
  contents: read
  actions: write

jobs:
  trigger-pins:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger content engine — run 1
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'content-engine.yml',
              ref: 'main'
            });
            console.log('Run 1 triggered');

      - name: Wait 5 minutes
        run: sleep 300

      - name: Trigger content engine — run 2
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'content-engine.yml',
              ref: 'main'
            });
            console.log('Run 2 triggered');

      - name: Wait 5 minutes
        run: sleep 300

      - name: Trigger content engine — run 3
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'content-engine.yml',
              ref: 'main'
            });
            console.log('Run 3 triggered');
