name: Dashboard Update

on:
  schedule:
    # Hourly at :15 to avoid top-of-hour runner contention
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  regenerate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate dashboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 -m analytics.generate_dashboard_v2

      - name: Commit updated dashboard
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@fitover35.com"
          git add outputs/fitover35-website/dashboard/index.html \
                  outputs/fitover35-website/dashboard/data.json
          if ! git diff --staged --quiet; then
            git commit -m "dashboard: hourly refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No dashboard changes to commit"
          fi
