name: Gumroad Sales Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Days to backfill (default 1)'
        required: false
        type: string
        default: '1'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  sync-sales:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install requests || true

      - name: Sync Gumroad sales
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '1' }}
        run: python3 scripts/gumroad_sales_sync.py
