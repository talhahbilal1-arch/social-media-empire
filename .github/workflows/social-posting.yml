name: Social Posting (X/Twitter + LinkedIn)

on:
  schedule:
    # Every 3 hours during waking hours (PST): 9AM, 12PM, 3PM, 6PM = 17,20,23,02 UTC
    - cron: '30 17 * * *'
    - cron: '30 20 * * *'
    - cron: '30 23 * * *'
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to post to: twitter, linkedin, or all'
        required: false
        default: 'all'
      live:
        description: 'Actually post (true) or dry-run (false)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  post-social:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q tweepy requests python-dotenv pydantic

      - name: Check for queue items
        id: check-queue
        run: |
          count=$(find automation/social_posting/queue -name "*.json" 2>/dev/null | wc -l)
          echo "queue_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "Queue is empty, nothing to post"
          else
            echo "Found $count items in queue"
          fi

      - name: Post one item from queue
        if: steps.check-queue.outputs.queue_count != '0'
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          LIVE_FLAG=""

          # On schedule, always post live (if creds exist)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LIVE_FLAG="--live"
          elif [ "${{ inputs.live }}" = "true" ]; then
            LIVE_FLAG="--live"
          fi

          # Skip if no Twitter creds and platform is twitter/all
          if [ -z "$TWITTER_API_KEY" ] && [ "$PLATFORM" != "linkedin" ]; then
            echo "::warning::TWITTER_API_KEY not set, skipping Twitter"
            if [ "$PLATFORM" = "twitter" ]; then
              exit 0
            fi
            PLATFORM="linkedin"
          fi

          # Skip if no LinkedIn creds and platform is linkedin/all
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ] && [ "$PLATFORM" != "twitter" ]; then
            echo "::warning::LINKEDIN_ACCESS_TOKEN not set, skipping LinkedIn"
            if [ "$PLATFORM" = "linkedin" ]; then
              exit 0
            fi
            PLATFORM="twitter"
          fi

          python -m automation.social_posting.cron_worker \
            --platform "$PLATFORM" \
            $LIVE_FLAG

      - name: Commit posted items
        if: steps.check-queue.outputs.queue_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/social_posting/queue/ automation/social_posting/posted/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "social: post $(date +%Y-%m-%d)"
            git push
          fi
