name: Content Engine

on:
  schedule:
    # 3 runs per day — renders content_ready pins after Make.com content generator fills them
    - cron: '0 16 * * *'  # 8 AM PST
    - cron: '0 22 * * *'  # 2 PM PST
    - cron: '0 4 * * *'   # 8 PM PST (next day UTC)
  workflow_dispatch:
    inputs:
      brand:
        description: 'Specific brand to generate for (fitness/deals/menopause)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no posting)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-flight check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAKE_WEBHOOK_FITNESS: ${{ secrets.MAKE_WEBHOOK_FITNESS }}
          MAKE_WEBHOOK_DEALS: ${{ secrets.MAKE_WEBHOOK_DEALS }}
          MAKE_WEBHOOK_MENOPAUSE: ${{ secrets.MAKE_WEBHOOK_MENOPAUSE }}
          MAKE_WEBHOOK_PINTEREST: ${{ secrets.MAKE_WEBHOOK_FITNESS }}
        run: python3 scripts/preflight_check.py

      - name: Render and publish pins
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAKE_WEBHOOK_FITNESS: ${{ secrets.MAKE_WEBHOOK_FITNESS }}
          MAKE_WEBHOOK_DEALS: ${{ secrets.MAKE_WEBHOOK_DEALS }}
          MAKE_WEBHOOK_MENOPAUSE: ${{ secrets.MAKE_WEBHOOK_MENOPAUSE }}
          MAKE_WEBHOOK_ACTIVATOR: ${{ secrets.MAKE_WEBHOOK_ACTIVATOR }}
          LATE_API_KEY: ${{ secrets.LATE_API_KEY }}
          LATE_API_KEY_2: ${{ secrets.LATE_API_KEY_2 }}
          LATE_API_KEY_3: ${{ secrets.LATE_API_KEY_3 }}
          LATE_API_KEY_4: ${{ secrets.LATE_API_KEY_4 }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BRAND_INPUT: ${{ github.event.inputs.brand || '' }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          import json
          import time
          import subprocess
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta
          from concurrent.futures import ThreadPoolExecutor

          sys.path.insert(0, '.')
          from video_automation.image_selector import get_unique_pexels_image
          from video_automation.pin_image_generator import render_pin_to_bytes, compute_image_hash
          from video_automation.supabase_storage import upload_pin_image
          from video_automation.pin_article_generator import (
              generate_article_for_pin, article_to_html, save_and_register_article,
              BRAND_SITE_CONFIG, _make_slug
          )
          from video_automation.content_brain import generate_pin_content, log_pin_to_history, check_image_hash_exists, validate_destination_link
          from video_automation.pinterest_boards import get_board_id
          from video_automation.product_pin_injector import should_inject_product_pin, get_product_pin

          dry_run = os.environ.get('DRY_RUN', 'false') == 'true'

          from database.supabase_client import get_supabase_client
          db = get_supabase_client()

          def log_pipeline_error(phase, brand, error, severity='medium'):
              """Log pipeline errors to Supabase errors table for system-health tracking."""
              try:
                  import traceback as _tb
                  db.client.table('errors').insert({
                      'error_type': 'content_engine',
                      'error_message': str(error)[:500],
                      'context': json.dumps({'phase': phase, 'brand': brand, 'trace': _tb.format_exc()[-500:]}),
                      'severity': severity,
                      'created_at': datetime.now(timezone.utc).isoformat()
                  }).execute()
              except Exception:
                  pass  # Never let error logging crash the pipeline

          # ══════════════════════════════════════════════════════════════
          # PRE-FLIGHT: Reactivate Make.com poster scenarios via Scenario
          # Activator webhook (bypasses Cloudflare that blocks direct API).
          # ══════════════════════════════════════════════════════════════
          activator_url = os.environ.get('MAKE_WEBHOOK_ACTIVATOR', '')
          if activator_url and not dry_run:
              print('=== PRE-FLIGHT: Reactivating Make.com scenarios ===')
              try:
                  _req = urllib.request.Request(
                      activator_url,
                      data=json.dumps({'action': 'activate_all'}).encode(),
                      headers={'Content-Type': 'application/json'},
                      method='POST'
                  )
                  with urllib.request.urlopen(_req, timeout=15) as _r:
                      print(f'  Scenario activator → HTTP {_r.status}')
                  time.sleep(5)  # Give scenarios time to activate before posting
              except Exception as _e:
                  print(f'  Scenario activator skipped: {_e}')

          # ══════════════════════════════════════════════════════════════
          # PHASE 0: Generate fresh pin content → insert as content_ready
          # ══════════════════════════════════════════════════════════════
          print('=== PHASE 0: Generating pin content ===')
          ALL_BRANDS = ['fitness', 'deals', 'menopause']
          brand_filter = os.environ.get('BRAND_INPUT', '').strip()
          brands_to_generate = [brand_filter] if brand_filter in ALL_BRANDS else ALL_BRANDS

          MAX_PINS_PER_DAY = 5  # Pinterest best practice: 1-5 pins/day/account
          today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          for brand in brands_to_generate:
              try:
                  # Guardrail: check daily pin count before generating
                  try:
                      today_count = db.client.table('content_history') \
                          .select('id', count='exact') \
                          .eq('brand', brand) \
                          .gte('created_at', today_str + 'T00:00:00Z') \
                          .execute()
                      pin_count = today_count.count if hasattr(today_count, 'count') else len(today_count.data or [])
                      if pin_count >= MAX_PINS_PER_DAY:
                          print(f'  [{brand}] SKIP — already {pin_count} pins today (max {MAX_PINS_PER_DAY})')
                          continue
                  except Exception as _e:
                      print(f'  [{brand}] Pin count check failed ({_e}), continuing...')

                  print(f'  Generating content for {brand}...')
                  pin_data = generate_pin_content(brand, db.client)
                  board_id = get_board_id(brand, pin_data.get('board', ''))
                  tips = pin_data.get('tips', [])
                  insert_row = {
                      'brand': brand,
                      'title': pin_data.get('title', ''),
                      'description': pin_data.get('description', ''),
                      'overlay_headline': pin_data.get('graphic_title', pin_data.get('title', ''))[:60],
                      'overlay_subtext': tips[0] if tips else '',
                      'tips': tips,
                      'pexels_search_term': pin_data.get('image_search_query', ''),
                      'board_id': board_id,
                      'destination_url': pin_data.get('destination_url', ''),
                      'topic': pin_data.get('topic', ''),
                      'niche': pin_data.get('category', ''),
                      'status': 'content_ready',
                  }
                  if not dry_run:
                      db.client.table('pinterest_pins').insert(insert_row).execute()
                      log_pin_to_history(pin_data, db.client)
                  print(f'  [{brand}] Content ready: {pin_data.get("title", "")[:50]}')
              except Exception as e:
                  print(f'  ERROR generating content for {brand}: {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('0', brand, e, severity='high')
          print()

          # ══════════════════════════════════════════════════════════════
          # PHASE 1: Render content_ready pins → upload images → set ready
          # ══════════════════════════════════════════════════════════════
          print('=== PHASE 1: Rendering content_ready pins ===')
          cutoff = (datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()
          try:
              query_result = db.client.table('pinterest_pins') \
                  .select('*') \
                  .eq('status', 'content_ready') \
                  .gte('created_at', cutoff) \
                  .execute()
              content_ready_pins = query_result.data or []
          except Exception as e:
              print(f'  WARNING: Could not query content_ready pins: {e}')
              log_pipeline_error('1', 'all', e, severity='high')
              content_ready_pins = []

          print(f'  Found {len(content_ready_pins)} content_ready pins')
          rendered_pins = []

          for pin in content_ready_pins:
              pin_id = pin['id']
              brand = pin['brand']
              try:
                  db.client.table('pinterest_pins').update({'status': 'rendering'}).eq('id', pin_id).execute()
              except Exception:
                  pass
              try:
                  search_term = pin.get('pexels_search_term') or pin.get('title', 'lifestyle photo')
                  headline = pin.get('overlay_headline') or pin.get('title', '')
                  subheadline = pin.get('overlay_subtext') or ''

                  # Render with deduplication: retry up to 3 times with different backgrounds
                  image_bytes = None
                  img_hash = None
                  for _attempt in range(3):
                      image = get_unique_pexels_image(search_term, brand, db.client)
                      image_bytes = render_pin_to_bytes(
                          brand=brand,
                          headline=headline,
                          subheadline=subheadline,
                          keyword_or_url=image['url'],
                          style='gradient',
                      )
                      img_hash = compute_image_hash(image_bytes)
                      if not check_image_hash_exists(img_hash, db.client):
                          break
                      print(f'  [{brand}] Duplicate image hash detected, retrying...')

                  timestamp = datetime.now(timezone.utc).strftime('%Y%m%d_%H%M%S')
                  filename = f"{brand}_{pin_id}_{timestamp}.jpg"
                  image_url = upload_pin_image(image_bytes, filename)
                  pin['image_hash'] = img_hash  # Pass to log_pin_to_history later

                  db.client.table('pinterest_pins').update({
                      'image_url': image_url,
                      'generated_image_url': image_url,
                      'status': 'ready'
                  }).eq('id', pin_id).execute()

                  pin['image_url'] = image_url
                  rendered_pins.append(pin)
                  print(f'  [{brand}] Rendered: {pin.get("title", "")[:50]}')

              except Exception as e:
                  print(f'  ERROR rendering pin {pin_id} ({brand}): {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('1', brand, e, severity='medium')
                  try:
                      db.client.table('pinterest_pins').update({'status': 'content_ready'}).eq('id', pin_id).execute()
                  except Exception:
                      pass

          print(f'  Rendered {len(rendered_pins)}/{len(content_ready_pins)} pins')

          # ══════════════════════════════════════════════════════════════
          # PHASE 1v: Generate + post VIDEO pins via Late API
          # Generates one video pin per brand per run using PIL+ffmpeg,
          # uploads to Supabase, posts via Late API (bypasses Pinterest
          # API denial by using Late's approved OAuth app).
          # ══════════════════════════════════════════════════════════════
          from video_automation.video_pin_generator import is_video_pin_enabled
          if is_video_pin_enabled():
              from video_automation.video_pin_generator import generate_video_pin
              from video_automation.content_brain import generate_video_pin_content
              from video_automation.supabase_storage import upload_pin_video
              from video_automation.pinterest_idea_pins import PinterestIdeaPinCreator
              from video_automation.pinterest_boards import get_board_id

              print('\n=== PHASE 1v: Generating & posting video pins ===')

              # Late API key mapping per brand
              # Match rescue-poster.yml mapping:
              # KEY_3 = fitness, KEY_2 = deals, KEY_4 = menopause
              LATE_KEY_MAP = {
                  'fitness': 'LATE_API_KEY_3',
                  'deals': 'LATE_API_KEY_2',
                  'menopause': 'LATE_API_KEY_4',
              }

              video_poster = PinterestIdeaPinCreator()
              video_posted = 0

              for brand in brands_to_generate:
                  try:
                      # Step 1: Generate video content (hook/solution/CTA) via Claude
                      print(f'  [{brand}] Generating video content...')
                      video_content = generate_video_pin_content(brand, db.client)
                      print(f'  [{brand}] Hook: "{video_content.get("hook", "")[:50]}"')

                      # Step 2: Render video (PIL frames → ffmpeg → MP4)
                      print(f'  [{brand}] Rendering video...')
                      result = generate_video_pin(brand, video_content)
                      if not result:
                          print(f'  [{brand}] Video generation returned None — skipping')
                          continue

                      video_bytes = result['video_bytes']
                      cover_bytes = result['cover_bytes']
                      print(f'  [{brand}] Video rendered: {len(video_bytes) / 1024:.0f}KB')

                      if dry_run:
                          print(f'  [{brand}] DRY RUN — would upload and post video pin')
                          continue

                      # Step 3: Upload video + cover to Supabase Storage
                      ts = datetime.now(timezone.utc).strftime('%Y%m%d_%H%M%S')
                      video_url = upload_pin_video(video_bytes, f'{brand}_video_{ts}.mp4')
                      cover_url = upload_pin_image(cover_bytes, f'{brand}_video_cover_{ts}.jpg')
                      print(f'  [{brand}] Uploaded to Supabase')

                      # Step 4: Post to Pinterest via Late API
                      board_name = video_content.get('board', '')
                      board_id = get_board_id(brand, board_name)
                      dest_url = video_content.get('destination_url', '')
                      late_key_env = LATE_KEY_MAP.get(brand, 'LATE_API_KEY')

                      post_result = video_poster.create_video_idea_pin(
                          board_id=str(board_id),
                          title=video_content.get('title', '')[:100],
                          description=video_content.get('description', '')[:500],
                          video_url=video_url,
                          link=dest_url,
                          api_key_env=late_key_env,
                      )

                      if post_result.get('success'):
                          video_posted += 1
                          print(f'  [{brand}] Video pin POSTED via Late API')
                          # Log to history
                          try:
                              log_pin_to_history({
                                  **video_content,
                                  'visual_style': 'video_pin',
                                  'angle_framework': 'video',
                                  'description_opener': 'video',
                                  'image_search_query': video_content.get('search_query', ''),
                              }, db.client)
                          except Exception:
                              pass
                      else:
                          print(f'  [{brand}] Late API failed: {post_result.get("error", "unknown")}')
                          log_pipeline_error('1v', brand, post_result.get('error', 'Late API failed'), severity='high')

                  except Exception as e:
                      print(f'  [{brand}] Video pin ERROR: {e}')
                      import traceback; traceback.print_exc()
                      log_pipeline_error('1v', brand, e, severity='medium')

              print(f'  Video pins posted: {video_posted}/{len(brands_to_generate)}')
          else:
              print('  Video pins: disabled (VIDEO_PIN_ENABLED = False)')

          # ══════════════════════════════════════════════════════════════
          # PHASE 2: Generate articles FIRST so pins link to articles
          # (articles must exist before posting so "Visit Site" → article)
          # ══════════════════════════════════════════════════════════════
          print('\n=== PHASE 2: Generating articles ===')
          articles_generated = []
          _articles_lock = __import__('threading').Lock()

          def _generate_article_for_pin(pin):
              brand = pin['brand']
              print(f'\n  --- Article for {brand}: {pin.get("title", "")[:50]} ---')
              try:
                  pin_data = {
                      'title': pin.get('title', ''),
                      'description': pin.get('description', ''),
                      'topic': pin.get('topic', '') or pin.get('niche', ''),
                      'trending_topic': pin.get('topic', ''),
                      'destination_url': pin.get('destination_url', ''),
                      'image_url': pin.get('image_url', ''),
                      'board': pin.get('board_id', ''),
                      'pexels_search_term': pin.get('pexels_search_term', '') or pin.get('title', ''),
                      'tips': pin.get('tips_list', []) or [],
                      'category': pin.get('category', ''),
                  }
                  slug, article_md = generate_article_for_pin(brand, pin_data, db.client)
                  if slug and article_md:
                      html = article_to_html(article_md, brand, slug, pin_data)
                      article_url = save_and_register_article(html, brand, slug, pin_data, db.client)
                      # Update in-memory pin so Phase 1b uses the article URL as the "Visit Site" link
                      pin['destination_url'] = article_url
                      try:
                          db.client.table('pinterest_pins').update({
                              'destination_url': article_url,
                              'article_generated': True
                          }).eq('id', pin['id']).execute()
                      except Exception:
                          pass
                      with _articles_lock:
                          articles_generated.append(f'{brand}: {slug}')
                      print(f'  [{brand}] Article → {article_url}')
                  elif slug:
                      site = BRAND_SITE_CONFIG.get(brand, {})
                      base_url = site.get('base_url', pin_data.get('destination_url', ''))
                      article_url = f'{base_url}/articles/{slug}.html'
                      pin['destination_url'] = article_url  # Update in-memory
                      try:
                          db.client.table('pinterest_pins').update({
                              'destination_url': article_url,
                              'article_generated': True
                          }).eq('id', pin['id']).execute()
                      except Exception:
                          pass
                      print(f'  [{brand}] Article exists: {article_url}')
                  else:
                      print(f'  [{brand}] No topic — pin will link to homepage')
              except Exception as e:
                  print(f'  Article failed for {brand}: {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('2', brand, e, severity='medium')

          if rendered_pins:
              with ThreadPoolExecutor(max_workers=3) as executor:
                  list(executor.map(_generate_article_for_pin, rendered_pins))
          else:
              print('  No rendered pins — skipping article generation')

          # ══════════════════════════════════════════════════════════════
          # PHASE 2b: Triple-check ALL affiliate links in new articles
          # Scans every Amazon link in every article generated this run.
          # Fixes wrong tags, fake ASINs, and missing tags on the fly.
          # ══════════════════════════════════════════════════════════════
          CANONICAL_TAG = 'dailydealdarling1-20'
          if articles_generated:
              print('\n=== PHASE 2b: Affiliate link audit ===')
              link_issues = 0
              link_ok = 0
              for pin in rendered_pins:
                  brand = pin['brand']
                  site = BRAND_SITE_CONFIG.get(brand, {})
                  output_dir = site.get('output_dir', '')
                  if not output_dir:
                      continue
                  workspace = os.environ.get('GITHUB_WORKSPACE', '.')
                  full_dir = os.path.join(workspace, output_dir)
                  # Check all HTML files in the output dir (not just new ones)
                  import glob as _glob
                  for html_path in _glob.glob(os.path.join(full_dir, '*.html')):
                      with open(html_path, 'r') as f:
                          content = f.read()
                      # Find all Amazon links
                      amazon_links = re.findall(r'https://www\.amazon\.com/[^"]+', content)
                      needs_fix = False
                      for link in amazon_links:
                          # Check 1: correct tag
                          if 'tag=' in link and f'tag={CANONICAL_TAG}' not in link:
                              needs_fix = True
                          # Check 2: has a tag at all
                          elif 'tag=' not in link:
                              needs_fix = True
                          # Check 3: no placeholder ASINs
                          elif re.search(r'/dp/[A-Z0-9]*X{3,}', link):
                              needs_fix = True
                          else:
                              link_ok += 1
                      if needs_fix:
                          # Re-run sanitizer on this file
                          from video_automation.pin_article_generator import _sanitize_affiliate_links
                          fixed = _sanitize_affiliate_links(content, brand)
                          if fixed != content:
                              with open(html_path, 'w') as f:
                                  f.write(fixed)
                              link_issues += 1
                              print(f'  [{brand}] FIXED: {os.path.basename(html_path)}')
              print(f'  Audit complete: {link_ok} links OK, {link_issues} files fixed')
          else:
              print('\n=== PHASE 2b: Skipped (no new articles) ===')

          # ══════════════════════════════════════════════════════════════
          # PHASE 3: Git commit + push articles (deploy before posting)
          # Vercel auto-deploys on push so articles are live before pins.
          # ══════════════════════════════════════════════════════════════
          if articles_generated and not dry_run:
              print('\n=== PHASE 3: Publishing articles ===')
              try:
                  subprocess.run(['git', 'config', 'user.name', 'Content Engine Bot'], check=True)
                  subprocess.run(['git', 'config', 'user.email', 'bot@fitover35.com'], check=True)
                  subprocess.run(['git', 'add', 'outputs/'], check=True)
                  result = subprocess.run(['git', 'diff', '--staged', '--quiet'])
                  if result.returncode != 0:
                      timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M')
                      subprocess.run(
                          ['git', 'commit', '-m', f'content: publish pin articles {timestamp}'],
                          check=True
                      )
                      subprocess.run(['git', 'push'], check=True)
                      print(f'  Pushed {len(articles_generated)} articles — Vercel deploying...')
                      time.sleep(90)  # Allow Vercel deploy to propagate before posting pins
                  else:
                      print('  No new article files to commit')
              except Exception as e:
                  print(f'  Git push failed: {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('3', 'all', e, severity='high')
          else:
              print('\n=== PHASE 3: Skipped ===')

          # ══════════════════════════════════════════════════════════════
          # PHASE 1b: Post rendered pins to Pinterest via Make.com webhooks
          # Runs AFTER articles are generated and pushed — so "Visit Site"
          # links directly to the conversion article, not the homepage.
          # Scenarios stay active via builtin:Ignore error handler.
          # ══════════════════════════════════════════════════════════════
          WEBHOOKS = {
              'fitness': os.environ.get('MAKE_WEBHOOK_FITNESS', ''),
              'deals': os.environ.get('MAKE_WEBHOOK_DEALS', ''),
              'menopause': os.environ.get('MAKE_WEBHOOK_MENOPAUSE', ''),
          }

          print('\n=== PHASE 1b: Posting pins to Pinterest ===')
          posted_count = 0
          for pin in rendered_pins:
              pin_id = pin['id']
              brand = pin['brand']
              webhook_url = WEBHOOKS.get(brand, '')
              if not webhook_url:
                  print(f'  [{brand}] SKIP — no webhook URL configured')
                  continue
              if dry_run:
                  print(f'  [{brand}] DRY RUN — would POST to article: {pin.get("destination_url","")[:70]}')
                  continue

              # Guardrail: validate ALL destination links before posting.
              # Fresh articles are also checked — if the deploy failed (e.g. Vercel
              # rate limit), the article URL will 404 and we fall back to homepage
              # instead of posting a broken link to Pinterest.
              dest_url = pin.get('destination_url', '')
              if dest_url and not validate_destination_link(dest_url):
                  from video_automation.content_brain import BRAND_CONFIGS
                  fallback = BRAND_CONFIGS.get(brand, {}).get('destination_base_url', '')
                  print(f'  [{brand}] WARN — destination link broken ({dest_url[:60]}), falling back to: {fallback}')
                  pin['destination_url'] = fallback
                  # Log to Supabase so rescue poster can redeploy + repost later
                  try:
                      db.client.table('errors').insert({
                          'error_type': 'article_url_404',
                          'error_message': f'Article URL 404 at post time: {dest_url}',
                          'context': json.dumps({'pin_id': str(pin.get("id","")), 'brand': brand}),
                          'severity': 'medium',
                      }).execute()
                  except Exception:
                      pass
              elif dest_url:
                  print(f'  [{brand}] Article URL verified ✓: {dest_url[:70]}')

              # CRITICAL: validate image_url — empty URL causes Pinterest 400
              image_url = pin.get('image_url', '') or ''
              if not image_url.startswith('http'):
                  print(f'  [{brand}] SKIP — image_url missing or invalid: "{image_url}"')
                  try:
                      db.client.table('pinterest_pins').update({
                          'status': 'failed',
                          'error_message': f'image_url missing: "{image_url}"',
                      }).eq('id', pin_id).execute()
                  except Exception:
                      pass
                  log_pipeline_error('1b', brand, f'image_url missing for pin {pin_id}', severity='high')
                  continue

              destination_url = pin.get('destination_url', '')
              payload = {
                  'pin_id': str(pin_id),
                  'brand': brand,
                  'title': pin.get('title', '')[:100],
                  'description': pin.get('description', '')[:500],
                  'image_url': image_url,
                  'link': destination_url,
                  'board_id': str(pin.get('board_id', '')),
              }
              print(f'  [{brand}] Posting → {destination_url[:70]}')
              print(f'  [{brand}]   board_id={payload["board_id"]}')

              # Retry logic: 3 attempts with exponential backoff
              success = False
              for attempt in range(3):
                  try:
                      if attempt == 0:
                          db.client.table('pinterest_pins').update({'status': 'posting'}).eq('id', pin_id).execute()
                      body = json.dumps(payload).encode('utf-8')
                      req = urllib.request.Request(
                          webhook_url,
                          data=body,
                          headers={'Content-Type': 'application/json'},
                          method='POST'
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          resp_body = resp.read().decode('utf-8', errors='replace')
                          print(f'  [{brand}] Webhook → HTTP {resp.status} "{resp_body[:60]}"')
                      db.client.table('pinterest_pins').update({
                          'status': 'posted',
                          'posted_at': datetime.now(timezone.utc).isoformat()
                      }).eq('id', pin_id).execute()
                      posted_count += 1
                      success = True
                      break
                  except urllib.error.HTTPError as e:
                      err_body = e.read().decode('utf-8', errors='replace')[:200]
                      print(f'  [{brand}] Attempt {attempt+1}/3 FAILED — HTTP {e.code}: {err_body}')
                      if attempt < 2:
                          time.sleep(5 * (attempt + 1))
                      else:
                          try:
                              db.client.table('pinterest_pins').update({
                                  'status': 'failed',
                                  'error_message': f'Webhook HTTP {e.code}: {err_body}',
                              }).eq('id', pin_id).execute()
                          except Exception:
                              pass
                          log_pipeline_error('1b', brand, f'Webhook HTTP {e.code}: {err_body}', severity='high')
                  except Exception as e:
                      print(f'  [{brand}] Attempt {attempt+1}/3 FAILED — {e}')
                      if attempt < 2:
                          time.sleep(5 * (attempt + 1))
                      else:
                          try:
                              db.client.table('pinterest_pins').update({
                                  'status': 'failed',
                                  'error_message': str(e)[:200],
                              }).eq('id', pin_id).execute()
                          except Exception:
                              pass
                          log_pipeline_error('1b', brand, e, severity='high')

          print(f'  Posted {posted_count}/{len(rendered_pins)} pins to Pinterest')

          # ══════════════════════════════════════════════════════════════
          # PHASE 4: Verify results — log any lingering failures
          # ══════════════════════════════════════════════════════════════
          if not dry_run and rendered_pins:
              print('\n=== PHASE 4: Verification ===')
              try:
                  fresh_cutoff = (datetime.now(timezone.utc) - timedelta(minutes=30)).isoformat()
                  failed_pins = db.client.table('pinterest_pins').select('id,brand,error_message') \
                      .eq('status', 'failed').gte('created_at', fresh_cutoff).execute()
                  if failed_pins.data:
                      for fp in failed_pins.data:
                          print(f'  [{fp["brand"]}] FAILED pin {fp["id"]}: {fp.get("error_message","")[:80]}')
                  else:
                      print(f'  All pins posted successfully ({posted_count}/{len(rendered_pins)})')
              except Exception as e:
                  print(f'  Verification query failed: {e}')

          # Summary
          print(f'\n=== Content Engine Summary ===')
          print(f'  Rendered: {len(rendered_pins)} pins')
          print(f'  Articles: {len(articles_generated)}')
          print(f'  Posted: {posted_count} pins')
          if not content_ready_pins:
              print('  No content_ready pins — pipeline idle')
          try:
              db.client.table('agent_runs').upsert({
                  'agent_name': 'content_pipeline',
                  'last_run_at': datetime.now(timezone.utc).isoformat(),
                  'status': 'success' if rendered_pins else 'idle',
                  'updated_at': datetime.now(timezone.utc).isoformat()
              }, on_conflict='agent_name').execute()
          except Exception:
              pass
          PYEOF

      - name: Deploy brand sites to Vercel
        id: deploy
        if: '!cancelled()'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_BRAND_TOKEN }}
          VERCEL_ORG: team_h4nMjQJcOXwrnK5fpKHrbJGq
          FITOVER35_PROJECT_ID: ${{ secrets.VERCEL_FITOVER35_PROJECT_ID }}
          DEALS_PROJECT_ID: ${{ secrets.VERCEL_DEALS_PROJECT_ID }}
          MENOPAUSE_PROJECT_ID: ${{ secrets.VERCEL_MENOPAUSE_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          echo "=== Deploying brand sites in parallel ==="
          rm -f /tmp/deploy_failures

          setup_vercel_project() {
            local dir="$1" project_id="$2" project_name="$3"
            mkdir -p "$dir/.vercel"
            echo "{\"projectId\":\"$project_id\",\"orgId\":\"$VERCEL_ORG\",\"projectName\":\"$project_name\"}" > "$dir/.vercel/project.json"
          }

          if [ -n "$FITOVER35_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/fitover35-website" "$FITOVER35_PROJECT_ID" "fitover35-website"
            cd $GITHUB_WORKSPACE/outputs/fitover35-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_fitness.log 2>&1 && echo "✅ fitover35 deployed" >> /tmp/vercel_fitness.log \
              || { echo "❌ fitover35 deploy failed" >> /tmp/vercel_fitness.log; echo "fitness" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ fitover35: VERCEL_FITOVER35_PROJECT_ID not set, skipping"
          fi

          if [ -n "$DEALS_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/dailydealdarling-website" "$DEALS_PROJECT_ID" "dailydealdarling-website"
            cd $GITHUB_WORKSPACE/outputs/dailydealdarling-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_deals.log 2>&1 && echo "✅ dailydealdarling deployed" >> /tmp/vercel_deals.log \
              || { echo "❌ deals deploy failed" >> /tmp/vercel_deals.log; echo "deals" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ dailydealdarling: VERCEL_DEALS_PROJECT_ID not set, skipping"
          fi

          if [ -n "$MENOPAUSE_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/menopause-planner-website" "$MENOPAUSE_PROJECT_ID" "menopause-planner-website"
            cd $GITHUB_WORKSPACE/outputs/menopause-planner-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_menopause.log 2>&1 && echo "✅ menopause-planner deployed" >> /tmp/vercel_menopause.log \
              || { echo "❌ menopause deploy failed" >> /tmp/vercel_menopause.log; echo "menopause" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ menopause-planner: VERCEL_MENOPAUSE_PROJECT_ID not set, skipping"
          fi

          echo "Waiting for parallel deploys to complete..."
          wait
          echo "=== Deploy logs ==="
          cat /tmp/vercel_*.log 2>/dev/null || true

          # Detect failures and expose to subsequent steps
          if [ -f /tmp/deploy_failures ]; then
            FAILED_BRANDS=$(cat /tmp/deploy_failures | tr '\n' ',' | sed 's/,$//')
            echo "deploy_failed=true" >> $GITHUB_OUTPUT
            echo "failed_brands=$FAILED_BRANDS" >> $GITHUB_OUTPUT
            echo "⚠️ DEPLOY FAILED for: $FAILED_BRANDS"
            echo "Articles committed but NOT live — pins will use homepage fallback"
          else
            echo "deploy_failed=false" >> $GITHUB_OUTPUT
            echo "failed_brands=" >> $GITHUB_OUTPUT
          fi

      - name: Update pin URLs if deploy failed
        if: steps.deploy.outputs.deploy_failed == 'true' && !cancelled()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FAILED_BRANDS: ${{ steps.deploy.outputs.failed_brands }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys
          from datetime import datetime, timezone, timedelta
          from urllib.request import Request, urlopen

          SUPABASE_URL = os.environ.get('SUPABASE_URL', '')
          SUPABASE_KEY = os.environ.get('SUPABASE_KEY', '')
          FAILED_BRANDS = os.environ.get('FAILED_BRANDS', '').split(',')

          BRAND_HOMEPAGES = {
              'fitness': 'https://fitover35.com',
              'deals': 'https://dailydealdarling.com',
              'menopause': 'https://menopause-planner-website.vercel.app',
          }

          if not SUPABASE_URL or not SUPABASE_KEY:
              print('No Supabase creds — skipping URL fix')
              sys.exit(0)

          cutoff = (datetime.now(timezone.utc) - timedelta(minutes=30)).strftime('%Y-%m-%dT%H:%M:%SZ')
          headers = {
              'apikey': SUPABASE_KEY,
              'Authorization': f'Bearer {SUPABASE_KEY}',
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
          }

          for brand in FAILED_BRANDS:
              brand = brand.strip()
              if not brand or brand not in BRAND_HOMEPAGES:
                  continue
              homepage = BRAND_HOMEPAGES[brand]
              print(f'[{brand}] Deploy failed — updating recent article-linked pins to homepage')

              # Update pins that were just posted with article URLs to homepage
              url = f'{SUPABASE_URL}/rest/v1/pinterest_pins?brand=eq.{brand}&status=in.(posting,posted)&created_at=gte.{cutoff}&destination_url=like.*articles*'
              body = json.dumps({'destination_url': homepage}).encode()
              req = Request(url, data=body, headers=headers, method='PATCH')
              try:
                  with urlopen(req, timeout=15) as resp:
                      result = json.loads(resp.read().decode())
                      print(f'  Updated {len(result)} pins to homepage fallback')
              except Exception as e:
                  print(f'  Failed to update pins: {e}')

              # Log deploy failure to errors table
              err_url = f'{SUPABASE_URL}/rest/v1/errors'
              err_body = json.dumps({
                  'error_type': 'deploy_failure',
                  'error_message': f'Vercel deploy failed for {brand} — likely 100/day rate limit hit',
                  'context': json.dumps({'brand': brand, 'workflow': 'content-engine'}),
                  'severity': 'high',
              }).encode()
              req = Request(err_url, data=err_body, headers=headers, method='POST')
              try:
                  with urlopen(req, timeout=10) as resp:
                      pass
              except Exception:
                  pass
          PYEOF

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-engine-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
