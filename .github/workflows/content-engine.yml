name: Content Engine

on:
  schedule:
    # 3 runs per day — 1 pin per brand per run, spaced 8 hours apart
    # 3 runs x 1 pin x 3 brands = 9 pins/day total (max 3/brand/day)
    # Pinterest 2026 algorithm rewards quality + spacing over volume
    - cron: '0 15 * * *'  #  7 AM PST — morning
    - cron: '0 23 * * *'  #  3 PM PST — afternoon
    - cron: '0 4 * * *'   #  8 PM PST — evening
  workflow_dispatch:
    inputs:
      brand:
        description: 'Specific brand to generate for (fitness/deals/menopause)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no posting)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg && npx @puppeteer/browsers install chromium@latest --path /tmp/chromium-browsers && echo "CHROME_PATH=$(find /tmp/chromium-browsers -name chrome -type f | head -1)" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion-videos/package-lock.json

      - name: Install Remotion dependencies
        run: cd remotion-videos && npm ci

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-flight check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAKE_WEBHOOK_FITNESS: ${{ secrets.MAKE_WEBHOOK_FITNESS }}
          MAKE_WEBHOOK_DEALS: ${{ secrets.MAKE_WEBHOOK_DEALS }}
          MAKE_WEBHOOK_MENOPAUSE: ${{ secrets.MAKE_WEBHOOK_MENOPAUSE }}
          MAKE_WEBHOOK_PILOTTOOLS: ${{ secrets.MAKE_WEBHOOK_PILOTTOOLS }}
          MAKE_WEBHOOK_HOMEDECOR: ${{ secrets.MAKE_WEBHOOK_HOMEDECOR }}
          MAKE_WEBHOOK_BEAUTY: ${{ secrets.MAKE_WEBHOOK_BEAUTY }}
          MAKE_WEBHOOK: ${{ secrets.MAKE_WEBHOOK }}
        run: python3 scripts/preflight_check.py

      - name: Render and publish pins
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAKE_WEBHOOK_FITNESS: ${{ secrets.MAKE_WEBHOOK_FITNESS }}
          MAKE_WEBHOOK_DEALS: ${{ secrets.MAKE_WEBHOOK_DEALS }}
          MAKE_WEBHOOK_MENOPAUSE: ${{ secrets.MAKE_WEBHOOK_MENOPAUSE }}
          MAKE_WEBHOOK_PILOTTOOLS: ${{ secrets.MAKE_WEBHOOK_PILOTTOOLS }}
          MAKE_WEBHOOK_HOMEDECOR: ${{ secrets.MAKE_WEBHOOK_HOMEDECOR }}
          MAKE_WEBHOOK_BEAUTY: ${{ secrets.MAKE_WEBHOOK_BEAUTY }}
          MAKE_WEBHOOK: ${{ secrets.MAKE_WEBHOOK }}
          MAKE_WEBHOOK_ACTIVATOR: ${{ secrets.MAKE_WEBHOOK_ACTIVATOR }}
          MAKE_WEBHOOK_VIDEO_FITNESS: ${{ secrets.MAKE_WEBHOOK_VIDEO_FITNESS }}
          MAKE_WEBHOOK_VIDEO_DEALS: ${{ secrets.MAKE_WEBHOOK_VIDEO_DEALS }}
          MAKE_WEBHOOK_VIDEO_MENOPAUSE: ${{ secrets.MAKE_WEBHOOK_VIDEO_MENOPAUSE }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          REMOTION_CHROME_EXECUTABLE: ${{ env.CHROME_PATH }}
          LATE_API_KEY: ${{ secrets.LATE_API_KEY }}
          LATE_API_KEY_2: ${{ secrets.LATE_API_KEY_2 }}
          LATE_API_KEY_3: ${{ secrets.LATE_API_KEY_3 }}
          LATE_API_KEY_4: ${{ secrets.LATE_API_KEY_4 }}
          # 'remotion' (default) = render in CI. 'local' = stage content to
          # Supabase; scripts/local_video_pipeline.py on the Mac renders it.
          VIDEO_STRATEGY: ${{ secrets.VIDEO_STRATEGY || 'remotion' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BRAND_INPUT: ${{ github.event.inputs.brand || '' }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          import json
          import re
          import time
          import subprocess
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta
          # ThreadPoolExecutor removed — sequential article generation to avoid Gemini rate limits

          sys.path.insert(0, '.')
          from video_automation.image_selector import get_unique_pexels_image
          from video_automation.pin_image_generator import render_pin_to_bytes, compute_image_hash, map_visual_style
          from video_automation.nano_banana_generator import add_text_overlay
          from video_automation.supabase_storage import upload_pin_image
          from video_automation.pin_article_generator import (
              generate_article_for_pin, article_to_html, save_and_register_article,
              BRAND_SITE_CONFIG, _make_slug
          )
          from video_automation.content_brain import generate_pin_content, log_pin_to_history, check_image_hash_exists, validate_destination_link
          from video_automation.gemini_client import health_check as gemini_health_check
          from video_automation.pinterest_boards import get_board_id
          from video_automation.product_pin_injector import should_inject_product_pin, get_product_pin

          dry_run = os.environ.get('DRY_RUN', 'false') == 'true'

          from database.supabase_client import get_supabase_client
          db = get_supabase_client()

          def log_pipeline_error(phase, brand, error, severity='medium'):
              """Log pipeline errors to Supabase errors table for system-health tracking."""
              try:
                  import traceback as _tb
                  db.client.table('errors').insert({
                      'error_type': 'content_engine',
                      'error_message': str(error)[:500],
                      'context': json.dumps({'phase': phase, 'brand': brand, 'trace': _tb.format_exc()[-500:]}),
                      'severity': severity,
                      'created_at': datetime.now(timezone.utc).isoformat()
                  }).execute()
              except Exception:
                  print(f'  [error-log] Failed to log error to DB: {error}')

          # ══════════════════════════════════════════════════════════════
          # HEALTH CHECK: Verify Gemini API works BEFORE spending time
          # ══════════════════════════════════════════════════════════════
          print('=== Gemini API Health Check ===')
          _hc_ok, _hc_detail = gemini_health_check()
          if _hc_ok:
              print(f'  Gemini API: HEALTHY (model={_hc_detail})')
          else:
              print(f'  Gemini API: FAILING — {_hc_detail}')
              print(f'  Will attempt content generation anyway (model fallback active)')
              log_pipeline_error('health_check', 'all', f'Gemini health check failed: {_hc_detail}', severity='high')

          # ══════════════════════════════════════════════════════════════
          # PRE-FLIGHT: Reactivate Make.com poster scenarios via Scenario
          # Activator webhook (bypasses Cloudflare that blocks direct API).
          # ══════════════════════════════════════════════════════════════
          activator_url = os.environ.get('MAKE_WEBHOOK_ACTIVATOR', '')
          if activator_url and not dry_run:
              print('=== PRE-FLIGHT: Reactivating Make.com scenarios ===')
              try:
                  _req = urllib.request.Request(
                      activator_url,
                      data=json.dumps({'action': 'activate_all'}).encode(),
                      headers={'Content-Type': 'application/json'},
                      method='POST'
                  )
                  with urllib.request.urlopen(_req, timeout=15) as _r:
                      print(f'  Scenario activator → HTTP {_r.status}')
                  time.sleep(5)  # Give scenarios time to activate before posting
              except Exception as _e:
                  print(f'  Scenario activator skipped: {_e}')

          # ══════════════════════════════════════════════════════════════
          # VIDEO/IMAGE RUN DECISION
          # Late API has been returning 401 since March, so video pin posting
          # is non-functional. Force IMAGE mode until the video pipeline is
          # restored, otherwise every scheduled run skips Phase 0 and no new
          # content_ready rows are created for fitness/deals/menopause.
          # ══════════════════════════════════════════════════════════════
          import random
          is_video_run = False
          print(f'=== RUN TYPE: {"VIDEO" if is_video_run else "IMAGE"} ===')

          # ══════════════════════════════════════════════════════════════
          # PHASE 0: Generate fresh pin content → insert as content_ready
          # (SKIPPED on video runs — video pins use Phase 1v instead)
          # ══════════════════════════════════════════════════════════════
          print('=== PHASE 0: Generating pin content ===')
          if is_video_run:
              print('  SKIPPED — this is a video run (Phase 1v will handle content)')

          ALL_BRANDS = ['fitness', 'deals', 'menopause', 'pilottools', 'homedecor', 'beauty']

          # Only brands with non-PENDING board IDs in pinterest_boards.py post
          # successfully. The original even/odd-hour rotation between Group A
          # and Group B sent ~⅔ of crons (hours 15, 23 UTC) to Group B brands
          # whose boards are still PENDING, so those runs produced no posted
          # pins. Restrict to Group A until the other accounts are wired up.
          import datetime as _dt
          _hour = _dt.datetime.now(_dt.timezone.utc).hour
          ACTIVE_GROUP = ['fitness', 'deals', 'menopause']
          brand_filter = os.environ.get('BRAND_INPUT', '').strip()
          brands_to_generate = [brand_filter] if brand_filter in ALL_BRANDS else ACTIVE_GROUP
          print(f'=== ACTIVE BRANDS THIS RUN: {brands_to_generate} (hour={_hour}) ===')

          MAX_PINS_PER_DAY = 3  # 3 pins/brand/day — Pinterest 2026 algorithm penalizes high volume
          MAX_PINS_PER_RUN = 1  # 1 pin/brand/run — spread pins across day for better engagement
          today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          for brand in brands_to_generate:
              if is_video_run:
                  continue  # Skip image pin generation on video runs
              try:
                  # Guardrail: check daily pin count before generating
                  pins_today = 0
                  try:
                      today_count = db.client.table('content_history') \
                          .select('id', count='exact') \
                          .eq('brand', brand) \
                          .gte('created_at', today_str + 'T00:00:00Z') \
                          .execute()
                      pins_today = today_count.count if hasattr(today_count, 'count') else len(today_count.data or [])
                      if pins_today >= MAX_PINS_PER_DAY:
                          print(f'  [{brand}] SKIP — already {pins_today} pins today (max {MAX_PINS_PER_DAY})')
                          continue
                  except Exception as _e:
                      print(f'  [{brand}] Pin count check failed ({_e}), continuing...')

                  remaining = min(MAX_PINS_PER_RUN, MAX_PINS_PER_DAY - pins_today)
                  print(f'  [{brand}] Generating {remaining} pin(s) ({pins_today} already today, {MAX_PINS_PER_DAY - pins_today} remaining)...')
                  for _pin_idx in range(remaining):
                      print(f'  Generating content for {brand} (pin {_pin_idx + 1}/{remaining})...')
                      pin_data = generate_pin_content(brand, db.client)
                      board_id = get_board_id(brand, pin_data.get('board', ''))
                      tips = pin_data.get('tips', [])
                      insert_row = {
                          'brand': brand,
                          'title': pin_data.get('title', ''),
                          'description': pin_data.get('description', ''),
                          'overlay_headline': pin_data.get('graphic_title', pin_data.get('title', ''))[:60],
                          'overlay_subtext': tips[0] if tips else '',
                          'tips': tips,
                          'pexels_search_term': pin_data.get('image_search_query', ''),
                          'board_id': board_id,
                          'destination_url': pin_data.get('destination_url', ''),
                          'topic': pin_data.get('topic', ''),
                          'niche': pin_data.get('category', ''),
                          'visual_style': pin_data.get('visual_style', ''),
                          'status': 'content_ready',
                      }
                      if not dry_run:
                          try:
                              db.client.table('pinterest_pins').insert(insert_row).execute()
                          except Exception as _insert_err:
                              # Schema may be missing extended columns — fall back to core columns only
                              # Run database/migrations/002_fix_pinterest_pins_schema.sql to fix permanently
                              print(f'  [{brand}] Full insert failed ({_insert_err}), trying core columns...')
                              core_row = {
                                  'brand': brand,
                                  'title': pin_data.get('title', ''),
                                  'description': pin_data.get('description', ''),
                                  'board_id': board_id,
                                  'destination_url': pin_data.get('destination_url', ''),
                                  'status': 'content_ready',
                              }
                              db.client.table('pinterest_pins').insert(core_row).execute()
                              print(f'  [{brand}] ⚠ DEGRADED MODE — run 002_fix_pinterest_pins_schema.sql in Supabase SQL Editor!')
                          log_pin_to_history(pin_data, db.client)
                      print(f'  [{brand}] Content ready: {pin_data.get("title", "")[:50]}')
              except Exception as e:
                  print(f'  ERROR generating content for {brand}: {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('0', brand, e, severity='high')
          print()

          # ── Product pin injection (30% chance per run, fitness only, image runs only) ──
          if not is_video_run and should_inject_product_pin():
              try:
                  promo = get_product_pin()
                  promo_board_id = get_board_id('fitness', promo.get('board', ''))
                  promo_row = {
                      'brand': 'fitness',
                      'title': promo['title'],
                      'description': promo['description'],
                      'overlay_headline': promo['graphic_title'],
                      'overlay_subtext': '',
                      'tips': [],
                      'pexels_search_term': promo['image_search_query'],
                      'board_id': promo_board_id,
                      'destination_url': promo['destination_url'],
                      'visual_style': promo['visual_style'],
                      'niche': 'product_promotion',
                      'status': 'content_ready',
                  }
                  if not dry_run:
                      db.client.table('pinterest_pins').insert(promo_row).execute()
                  print(f'  [fitness] PROMO PIN injected: {promo["title"][:50]}')
              except Exception as e:
                  print(f'  Product pin injection skipped: {e}')

          # ══════════════════════════════════════════════════════════════
          # PHASE 1: Render content_ready pins → upload images → set ready
          # ══════════════════════════════════════════════════════════════
          print('=== PHASE 1: Rendering content_ready pins ===')
          cutoff = (datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()
          try:
              query_result = db.client.table('pinterest_pins') \
                  .select('*') \
                  .eq('status', 'content_ready') \
                  .gte('created_at', cutoff) \
                  .execute()
              content_ready_pins = query_result.data or []
          except Exception as e:
              print(f'  WARNING: Could not query content_ready pins: {e}')
              log_pipeline_error('1', 'all', e, severity='high')
              content_ready_pins = []

          print(f'  Found {len(content_ready_pins)} content_ready pins')
          rendered_pins = []

          for pin in content_ready_pins:
              pin_id = pin['id']
              brand = pin['brand']
              try:
                  db.client.table('pinterest_pins').update({'status': 'rendering'}).eq('id', pin_id).execute()
              except Exception:
                  pass
              try:
                  search_term = pin.get('pexels_search_term') or pin.get('title', 'lifestyle photo')
                  headline = pin.get('overlay_headline') or pin.get('title', '')

                  # Use the visual style from content_brain instead of always 'gradient'
                  pin_style = map_visual_style(pin.get('visual_style', '')) if pin.get('visual_style') else 'gradient'

                  # For list-based styles, format all tips as numbered items for the renderer
                  tips_list = pin.get('tips', []) or []
                  if pin_style in ('numbered_list', 'checklist', 'comparison') and tips_list:
                      subheadline = ' '.join(f'{i+1}. {t}' for i, t in enumerate(tips_list[:5]))
                  else:
                      subheadline = pin.get('overlay_subtext') or ''

                  # ── Image generation: try Nano Banana (AI) first, fall back to Pexels+PIL ──
                  from video_automation.nano_banana_generator import generate_pin_image as nb_generate
                  image_bytes = None
                  img_hash = None
                  _nb_used = False
                  topic_for_image = pin.get('topic') or pin.get('title', '') or search_term
                  try:
                      print(f'  [{brand}] Nano Banana: generating AI image for: {topic_for_image[:50]}')
                      image_bytes = nb_generate(brand, topic_for_image)
                      img_hash = compute_image_hash(image_bytes)
                      _nb_used = True
                      print(f'  [{brand}] Nano Banana: {len(image_bytes)} bytes generated')
                  except Exception as _nb_err:
                      print(f'  [{brand}] Nano Banana failed ({_nb_err}), falling back to Pexels+PIL')
                      image_bytes = None

                  if not _nb_used:
                      # Pexels+PIL fallback with deduplication (up to 3 attempts)
                      for _attempt in range(3):
                          image = get_unique_pexels_image(search_term, brand, db.client)
                          image_bytes = render_pin_to_bytes(
                              brand=brand,
                              headline=headline,
                              subheadline=subheadline,
                              keyword_or_url=image['url'],
                              style=pin_style,
                          )
                          img_hash = compute_image_hash(image_bytes)
                          if not check_image_hash_exists(img_hash, db.client):
                              break
                          print(f'  [{brand}] Duplicate image hash detected, retrying...')

                  # Apply brand template to Nano Banana AI images only.
                  # render_pin_to_bytes (Pexels path) already renders the full template;
                  # running add_text_overlay on top would produce double/ghost text.
                  if _nb_used:
                      image_bytes = add_text_overlay(image_bytes, headline, brand)

                  timestamp = datetime.now(timezone.utc).strftime('%Y%m%d_%H%M%S')
                  ext = 'png' if _nb_used else 'jpg'
                  filename = f"{brand}_{pin_id}_{timestamp}.{ext}"
                  image_url = upload_pin_image(image_bytes, filename)
                  pin['image_hash'] = img_hash  # Pass to log_pin_to_history later

                  try:
                      db.client.table('pinterest_pins').update({
                          'image_url': image_url,
                          'generated_image_url': image_url,
                          'status': 'ready'
                      }).eq('id', pin_id).execute()
                  except Exception:
                      # Fallback if generated_image_url column doesn't exist yet
                      db.client.table('pinterest_pins').update({
                          'image_url': image_url,
                          'status': 'ready'
                      }).eq('id', pin_id).execute()

                  pin['image_url'] = image_url
                  rendered_pins.append(pin)
                  print(f'  [{brand}] Rendered: {pin.get("title", "")[:50]}')

              except Exception as e:
                  print(f'  ERROR rendering pin {pin_id} ({brand}): {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('1', brand, e, severity='medium')
                  try:
                      db.client.table('pinterest_pins').update({'status': 'content_ready'}).eq('id', pin_id).execute()
                  except Exception:
                      pass

          print(f'  Rendered {len(rendered_pins)}/{len(content_ready_pins)} pins')

          # ══════════════════════════════════════════════════════════════
          # PHASE 1v: Generate + post VIDEO FRAME pins via image webhooks
          # Renders video, extracts cover frame (branded JPEG), uploads to
          # Supabase, posts via the same Make.com image webhooks as normal
          # pins. Video URL is included in description for viewer access.
          # ══════════════════════════════════════════════════════════════
          from video_automation.video_pin_generator import is_video_pin_enabled
          if is_video_run or is_video_pin_enabled():
              from video_automation.video_pin_generator import generate_video_pin
              from video_automation.content_brain import generate_video_pin_content
              from video_automation.supabase_storage import upload_pin_video
              from video_automation.pinterest_boards import get_board_id
              from video_automation.video_scene_generator import generate_scene_images
              from video_automation.remotion_renderer import render_remotion_video

              # VIDEO_STRATEGY routes between two video pipelines:
              #   'remotion' (default): render in CI, post in CI (existing flow)
              #   'local'              : stage content to Supabase with
              #                          video_state='video_pending'; the Mac
              #                          launchd job renders via Short Video
              #                          Maker and posts
              VIDEO_STRATEGY = os.environ.get('VIDEO_STRATEGY', 'remotion').lower().strip()
              print(f'\n=== PHASE 1v: video strategy = {VIDEO_STRATEGY} ===')

              video_posted = 0
              video_posted_per_brand = {b: 0 for b in brands_to_generate}
              video_pending_staged = 0

              for brand in brands_to_generate:
                  try:
                      # Step 1: Generate video content (hook/solution/CTA/tips) via Claude
                      print(f'  [{brand}] Generating video content...')
                      video_content = generate_video_pin_content(brand, db.client)
                      print(f'  [{brand}] Hook: "{video_content.get("hook", "")[:50]}"')

                      # Local strategy: stage content to Supabase and stop.
                      # The Mac-side launchd job (scripts/local_video_pipeline.py)
                      # picks this row up, renders via Short Video Maker, posts.
                      if VIDEO_STRATEGY == 'local':
                          board_name = video_content.get('board', '')
                          board_id = get_board_id(brand, board_name)
                          dest_url = video_content.get('destination_url', '')
                          site = BRAND_SITE_CONFIG.get(brand, {})
                          if not dest_url or '/articles/' not in dest_url:
                              dest_url = f"{site.get('base_url', '')}/articles/"
                          if dry_run:
                              print(f'  [{brand}] DRY RUN — would stage video_pending pin')
                              continue
                          try:
                              # Only use columns that exist in the pinterest_pins table
                              pin_row = {
                                  'brand': brand,
                                  'title': video_content.get('title', '')[:200],
                                  'description': video_content.get('description', '')[:1000],
                                  'topic': video_content.get('topic', ''),
                                  'category': video_content.get('category', ''),
                                  'destination_url': dest_url,
                                  'board_id': str(board_id),
                                  'overlay_headline': video_content.get('hook', ''),
                                  'overlay_subtext': video_content.get('solution', ''),
                                  'pexels_search_term': video_content.get('search_query', ''),
                                  'status': 'pending',
                                  'created_at': datetime.now(timezone.utc).isoformat(),
                              }
                              # Try adding video_state if column exists (migration 004)
                              try:
                                  pin_row['video_state'] = 'video_pending'
                                  db.client.table('pinterest_pins').insert(pin_row).execute()
                              except Exception:
                                  pin_row.pop('video_state', None)
                                  db.client.table('pinterest_pins').insert(pin_row).execute()
                              video_pending_staged += 1
                              print(f'  [{brand}] Staged video_pending pin (board {board_id})')
                          except Exception as _se:
                              print(f'  [{brand}] Failed to stage pending pin: {_se}')
                              log_pipeline_error('1v', brand, f'stage pending: {_se}', severity='high')
                          continue  # skip render + post — local pipeline handles it

                      # Step 2: Render video — try Remotion first, fall back to PIL+ffmpeg
                      print(f'  [{brand}] Rendering video...')
                      try:
                          scene_images = generate_scene_images(brand, video_content)
                          result = render_remotion_video(brand, video_content, scene_images)
                      except Exception as _re:
                          print(f'  [{brand}] Remotion pipeline errored: {_re}')
                          result = None
                      if not result:
                          print(f'  [{brand}] Remotion unavailable — falling back to PIL+ffmpeg')
                          result = generate_video_pin(brand, video_content)
                      if not result:
                          print(f'  [{brand}] Video generation returned None — skipping')
                          continue

                      video_bytes = result['video_bytes']
                      cover_bytes = result['cover_bytes']
                      print(f'  [{brand}] Video rendered: {len(video_bytes) / 1024:.0f}KB')

                      if dry_run:
                          print(f'  [{brand}] DRY RUN — would upload and post video pin')
                          continue

                      # Step 3: Upload video + cover to Supabase Storage
                      ts = datetime.now(timezone.utc).strftime('%Y%m%d_%H%M%S')
                      video_url = upload_pin_video(video_bytes, f'{brand}_video_{ts}.mp4')
                      cover_url = upload_pin_image(cover_bytes, f'{brand}_video_cover_{ts}.jpg')
                      print(f'  [{brand}] Uploaded to Supabase')

                      # Calculate board_id and dest_url before posting
                      board_name = video_content.get('board', '')
                      board_id = get_board_id(brand, board_name)
                      dest_url = video_content.get('destination_url', '')
                      site = BRAND_SITE_CONFIG.get(brand, {})
                      if not dest_url or '/articles/' not in dest_url:
                          dest_url = f"{site.get('base_url', '')}/articles/"

                      # Step 4: Post video pin via Zernio API (handles Pinterest 3-step video upload)
                      # Falls back to Make.com image webhook if Zernio not configured
                      from video_automation.zernio_poster import is_zernio_configured, post_video_pin as zernio_post_video
                      
                      if is_zernio_configured():
                          zernio_result = zernio_post_video(
                              video_url=video_url,
                              title=video_content.get('title', '')[:100],
                              description=video_content.get('description', '')[:500],
                              board_id=str(board_id),
                              link=dest_url,
                          )
                          if zernio_result:
                              video_posted += 1
                              video_posted_per_brand[brand] = video_posted_per_brand.get(brand, 0) + 1
                              pin_url = zernio_result.get('pin_url', '')
                              print(f'  [{brand}] VIDEO PIN POSTED via Zernio ✅ {pin_url}')
                              try:
                                  log_pin_to_history({
                                      **video_content,
                                      'visual_style': 'video_pin',
                                      'angle_framework': 'video',
                                      'description_opener': 'video',
                                      'image_search_query': video_content.get('search_query', ''),
                                  }, db.client)
                              except Exception:
                                  pass
                              continue  # Success — skip Make.com fallback
                          else:
                              print(f'  [{brand}] Zernio failed — falling back to Make.com webhook')
                      
                      # Fallback: Make.com image webhook
                      IMAGE_WEBHOOKS = {
                          'fitness': os.environ.get('MAKE_WEBHOOK_FITNESS', ''),
                          'deals': os.environ.get('MAKE_WEBHOOK_DEALS', ''),
                          'menopause': os.environ.get('MAKE_WEBHOOK_MENOPAUSE', ''),
                          'pilottools': os.environ.get('MAKE_WEBHOOK_PILOTTOOLS', ''),
                          'homedecor': os.environ.get('MAKE_WEBHOOK_HOMEDECOR', ''),
                          'beauty': os.environ.get('MAKE_WEBHOOK_BEAUTY', ''),
                      }
                      video_webhook = IMAGE_WEBHOOKS.get(brand, '')
                      is_native_video = False
                      if not video_webhook:
                          print(f'  [{brand}] Pin SKIPPED — no webhook configured')
                          log_pipeline_error('1v', brand, f'No webhook for {brand}', severity='medium')
                          continue

                      # dest_url already set by article generation above

                      # ── FIX: Video pins must link to articles, not homepage ──
                      # Generate an article for this video's topic if one doesn't exist
                      site = BRAND_SITE_CONFIG.get(brand, {})
                      video_base_url = site.get('base_url', '')
                      if not dest_url or '/articles/' not in dest_url:
                          video_topic = video_content.get('topic', '') or video_content.get('hook', '')[:50]
                          if video_topic:
                              try:
                                  video_pin_data = {
                                      'title': video_content.get('title', ''),
                                      'topic': video_topic,
                                      'trending_topic': video_topic,
                                      'description': video_content.get('description', ''),
                                      'destination_url': dest_url,
                                      'tips': video_content.get('tips', []),
                                      'category': video_content.get('category', ''),
                                  }
                                  slug, article_md = generate_article_for_pin(brand, video_pin_data, db.client)
                                  if slug and article_md:
                                      html = article_to_html(article_md, brand, slug, video_pin_data)
                                      article_url = save_and_register_article(html, brand, slug, video_pin_data, db.client)
                                      dest_url = article_url
                                      print(f'  [{brand}] Video article generated → {article_url}')
                                  elif slug:
                                      dest_url = f'{video_base_url}/articles/{slug}.html'
                                      print(f'  [{brand}] Video article exists → {dest_url}')
                                  else:
                                      dest_url = f'{video_base_url}/articles/'
                                      print(f'  [{brand}] Video article gen failed — using articles index')
                              except Exception as _ae:
                                  print(f'  [{brand}] Video article gen error: {_ae}')
                                  dest_url = f'{video_base_url}/articles/'
                          else:
                              dest_url = f'{video_base_url}/articles/'
                              print(f'  [{brand}] No video topic — using articles index')

                      # Include video URL in description so viewers can watch the full video
                      desc = video_content.get('description', '')[:450]
                      if video_url:
                          desc = desc + '\n\n🎥 Watch the full video: ' + video_url

                      video_frame_payload = {
                          'title': video_content.get('title', '')[:100],
                          'description': desc[:500],
                          'image_url': video_url if is_native_video else cover_url,
                          'cover_url': cover_url,
                          'board_id': str(board_id),
                          'link': dest_url,
                      }
                      try:
                          _vreq = urllib.request.Request(
                              video_webhook,
                              data=json.dumps(video_frame_payload).encode('utf-8'),
                              headers={'Content-Type': 'application/json'},
                              method='POST',
                          )
                          with urllib.request.urlopen(_vreq, timeout=30) as _vr:
                              _vstatus = _vr.status
                              _vr_body = _vr.read().decode('utf-8', errors='replace')
                          pin_type = 'VIDEO' if is_native_video else 'IMAGE+COVER'
                          print(f'  [{brand}] {pin_type} webhook → HTTP {_vstatus} "{_vr_body[:60]}"')
                          video_posted += 1
                          video_posted_per_brand[brand] = video_posted_per_brand.get(brand, 0) + 1
                          print(f'  [{brand}] {pin_type} pin POSTED ✅')
                          try:
                              log_pin_to_history({
                                  **video_content,
                                  'visual_style': 'video_pin',
                                  'angle_framework': 'video',
                                  'description_opener': 'video',
                                  'image_search_query': video_content.get('search_query', ''),
                              }, db.client)
                          except Exception:
                              pass
                      except urllib.error.HTTPError as _ve:
                          print(f'  [{brand}] Video frame webhook HTTP {_ve.code}: {_ve.read().decode("utf-8", errors="replace")[:100]}')
                          log_pipeline_error('1v', brand, f'Video frame webhook HTTP {_ve.code}', severity='high')
                      except Exception as _ve:
                          print(f'  [{brand}] Video frame webhook failed: {_ve}')
                          log_pipeline_error('1v', brand, f'Video frame webhook error: {_ve}', severity='high')

                  except Exception as e:
                      print(f'  [{brand}] Video pin ERROR: {e}')
                      import traceback; traceback.print_exc()
                      log_pipeline_error('1v', brand, e, severity='medium')

              if VIDEO_STRATEGY == 'local':
                  print(f'  Video pins staged for local render: {video_pending_staged}/{len(brands_to_generate)}')
              else:
                  print(f'  Video pins posted: {video_posted}/{len(brands_to_generate)}')
          else:
              print('  Video pins: disabled (not a video run and VIDEO_PIN_ENABLED = False)')

          # ══════════════════════════════════════════════════════════════
          # PHASE 2: Generate articles FIRST so pins link to articles
          # (articles must exist before posting so "Visit Site" → article)
          # ══════════════════════════════════════════════════════════════
          print('\n=== PHASE 2: Generating articles ===')
          articles_generated = []
          _articles_lock = __import__('threading').Lock()

          def _generate_article_for_pin(pin):
              brand = pin['brand']
              print(f'\n  --- Article for {brand}: {pin.get("title", "")[:50]} ---')
              pin_data = {
                  'title': pin.get('title', ''),
                  'description': pin.get('description', ''),
                  'topic': pin.get('topic', '') or pin.get('niche', ''),
                  'trending_topic': pin.get('topic', ''),
                  'destination_url': pin.get('destination_url', ''),
                  'image_url': pin.get('image_url', ''),
                  'board': pin.get('board_id', ''),
                  'pexels_search_term': pin.get('pexels_search_term', '') or pin.get('title', ''),
                  'tips': pin.get('tips', []) or pin.get('tips_list', []) or [],
                  'category': pin.get('category', ''),
              }
              site = BRAND_SITE_CONFIG.get(brand, {})
              base_url = site.get('base_url', '')
              articles_index_url = f'{base_url}/articles/' if base_url else ''

              # Try article generation with one retry on failure
              for attempt in range(2):
                  try:
                      slug, article_md = generate_article_for_pin(brand, pin_data, db.client)
                      if slug and article_md:
                          html = article_to_html(article_md, brand, slug, pin_data)
                          article_url = save_and_register_article(html, brand, slug, pin_data, db.client)
                          pin['destination_url'] = article_url
                          try:
                              db.client.table('pinterest_pins').update({
                                  'destination_url': article_url,
                                  'article_generated': True
                              }).eq('id', pin['id']).execute()
                          except Exception:
                              pass
                          with _articles_lock:
                              articles_generated.append(f'{brand}: {slug}')
                          print(f'  [{brand}] Article → {article_url}')
                          return  # Success
                      elif slug:
                          article_url = f'{base_url}/articles/{slug}.html'
                          pin['destination_url'] = article_url
                          try:
                              db.client.table('pinterest_pins').update({
                                  'destination_url': article_url,
                                  'article_generated': True
                              }).eq('id', pin['id']).execute()
                          except Exception:
                              pass
                          print(f'  [{brand}] Article exists: {article_url}')
                          return  # Success — article already existed
                      elif attempt == 0:
                          print(f'  [{brand}] No topic/slug — retrying once...')
                          continue
                  except Exception as e:
                      if attempt == 0:
                          print(f'  [{brand}] Article attempt 1 failed ({e}), retrying...')
                          import traceback; traceback.print_exc()
                          continue
                      print(f'  [{brand}] Article attempt 2 failed: {e}')
                      import traceback; traceback.print_exc()
                      log_pipeline_error('2', brand, e, severity='medium')

              # Both attempts failed — fall back to /articles/ index, NOT homepage
              fallback_url = articles_index_url or base_url
              pin['destination_url'] = fallback_url
              print(f'  [{brand}] Article generation failed — falling back to: {fallback_url}')
              log_pipeline_error(
                  '2', brand,
                  f'Article gen failed after 2 attempts for pin {pin.get("id", "?")}. Fallback: {fallback_url}',
                  severity='high'
              )
              try:
                  db.client.table('pinterest_pins').update({
                      'destination_url': fallback_url,
                      'article_generated': False
                  }).eq('id', pin['id']).execute()
              except Exception:
                  pass

          if rendered_pins:
              # Sequential to avoid Gemini API rate limits (429 errors)
              for pin in rendered_pins:
                  _generate_article_for_pin(pin)
          else:
              print('  No rendered pins — skipping article generation')

          # ══════════════════════════════════════════════════════════════
          # PHASE 2b: Triple-check ALL affiliate links in new articles
          # Scans every Amazon link in every article generated this run.
          # Fixes wrong tags, fake ASINs, and missing tags on the fly.
          # ══════════════════════════════════════════════════════════════
          BRAND_AFFILIATE_TAG = {
              'fitness': 'fitover3509-20',
              'deals': 'dailydealdarl-20',
              'menopause': 'dailydealdarl-20',
          }
          if articles_generated:
              print('\n=== PHASE 2b: Affiliate link audit ===')
              link_issues = 0
              link_ok = 0
              for pin in rendered_pins:
                  brand = pin['brand']
                  canonical_tag = BRAND_AFFILIATE_TAG.get(brand, '')
                  if not canonical_tag:
                      continue  # Skip brands without affiliate tags
                  site = BRAND_SITE_CONFIG.get(brand, {})
                  output_dir = site.get('output_dir', '')
                  if not output_dir:
                      continue
                  workspace = os.environ.get('GITHUB_WORKSPACE', '.')
                  full_dir = os.path.join(workspace, output_dir)
                  # Check all HTML files in the output dir (not just new ones)
                  import glob as _glob
                  for html_path in _glob.glob(os.path.join(full_dir, '*.html')):
                      with open(html_path, 'r') as f:
                          content = f.read()
                      # Find all Amazon links
                      amazon_links = re.findall(r'https://www\.amazon\.com/[^"]+', content)
                      needs_fix = False
                      for link in amazon_links:
                          # Check 1: correct tag for THIS brand
                          if 'tag=' in link and f'tag={canonical_tag}' not in link:
                              needs_fix = True
                          # Check 2: has a tag at all
                          elif 'tag=' not in link:
                              needs_fix = True
                          # Check 3: no placeholder ASINs
                          elif re.search(r'/dp/[A-Z0-9]*X{3,}', link):
                              needs_fix = True
                          else:
                              link_ok += 1
                      if needs_fix:
                          # Re-run sanitizer on this file
                          from video_automation.pin_article_generator import _sanitize_affiliate_links
                          fixed = _sanitize_affiliate_links(content, brand)
                          if fixed != content:
                              with open(html_path, 'w') as f:
                                  f.write(fixed)
                              link_issues += 1
                              print(f'  [{brand}] FIXED: {os.path.basename(html_path)}')
              print(f'  Audit complete: {link_ok} links OK, {link_issues} files fixed')
          else:
              print('\n=== PHASE 2b: Skipped (no new articles) ===')

          # ══════════════════════════════════════════════════════════════
          # PHASE 3: Git commit + push articles (deploy before posting)
          # Vercel auto-deploys on push so articles are live before pins.
          # ══════════════════════════════════════════════════════════════
          if articles_generated and not dry_run:
              print('\n=== PHASE 3: Publishing articles ===')
              try:
                  subprocess.run(['git', 'config', 'user.name', 'Content Engine Bot'], check=True)
                  subprocess.run(['git', 'config', 'user.email', 'bot@fitover35.com'], check=True)
                  subprocess.run(['git', 'add', 'outputs/'], check=True)
                  result = subprocess.run(['git', 'diff', '--staged', '--quiet'])
                  if result.returncode != 0:
                      timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M')
                      subprocess.run(
                          ['git', 'commit', '-m', f'content: publish pin articles {timestamp}'],
                          check=True
                      )
                      # Retry git push up to 3 times with backoff
                      for push_attempt in range(3):
                          try:
                              subprocess.run(['git', 'push'], check=True)
                              break
                          except subprocess.CalledProcessError:
                              if push_attempt < 2:
                                  wait = (push_attempt + 1) * 5
                                  print(f'  Git push attempt {push_attempt+1} failed, retrying in {wait}s...')
                                  time.sleep(wait)
                              else:
                                  raise
                      print(f'  Pushed {len(articles_generated)} articles — Vercel deploying...')
                      time.sleep(90)  # Allow Vercel deploy to propagate before posting pins
                  else:
                      print('  No new article files to commit')
              except Exception as e:
                  print(f'  Git push failed: {e}')
                  import traceback; traceback.print_exc()
                  log_pipeline_error('3', 'all', e, severity='high')
          else:
              print('\n=== PHASE 3: Skipped ===')

          # ══════════════════════════════════════════════════════════════
          # PHASE 1b: Post rendered pins to Pinterest via Make.com webhooks
          # Runs AFTER articles are generated and pushed — so "Visit Site"
          # links directly to the conversion article, not the homepage.
          # Scenarios stay active via builtin:Ignore error handler.
          # ══════════════════════════════════════════════════════════════
          # Brand-specific webhooks (legacy per-brand scenarios)
          WEBHOOKS = {
              'fitness': os.environ.get('MAKE_WEBHOOK_FITNESS', ''),
              'deals': os.environ.get('MAKE_WEBHOOK_DEALS', ''),
              'menopause': os.environ.get('MAKE_WEBHOOK_MENOPAUSE', ''),
              'pilottools': os.environ.get('MAKE_WEBHOOK_PILOTTOOLS', ''),
              'homedecor': os.environ.get('MAKE_WEBHOOK_HOMEDECOR', ''),
              'beauty': os.environ.get('MAKE_WEBHOOK_BEAUTY', ''),
          }
          # Unified fallback — used when a brand-specific secret is empty.
          # The unified Make.com scenario routes by the `brand` field in the payload.
          UNIFIED_WEBHOOK = os.environ.get('MAKE_WEBHOOK', '')

          # Map Python short keys → hyphenated slugs that Make.com filters expect.
          # Imported from video_automation/brand_slugs.py — single source of truth.
          # See docs/MANUAL_SETUP_GUIDE.md — filters use `brand == "fitness-made-easy"` etc.
          from video_automation.brand_slugs import BRAND_SLUG

          print('\n=== PHASE 1b: Posting pins to Pinterest ===')
          posted_count = 0
          posted_brands = set()
          posted_per_brand = {b: 0 for b in ALL_BRANDS}
          for pin in rendered_pins:
              pin_id = pin['id']
              brand = pin['brand']
              webhook_url = WEBHOOKS.get(brand, '') or UNIFIED_WEBHOOK
              if not webhook_url:
                  print(f'  [{brand}] SKIP — no webhook URL configured (neither MAKE_WEBHOOK_{brand.upper()} nor MAKE_WEBHOOK is set)')
                  # Loud failure — log to Supabase so watchdog + dashboards see it.
                  log_pipeline_error(
                      '1b',
                      brand,
                      f'No Make.com webhook configured for {brand} — pin {pin_id} dropped. Set MAKE_WEBHOOK_{brand.upper()} or MAKE_WEBHOOK in GitHub Secrets.',
                      severity='high',
                  )
                  try:
                      db.client.table('pinterest_pins').update({
                          'status': 'failed',
                          'error_message': f'No webhook configured for {brand}',
                      }).eq('id', pin_id).execute()
                  except Exception:
                      try:
                          db.client.table('pinterest_pins').update({'status': 'failed'}).eq('id', pin_id).execute()
                      except Exception:
                          pass
                  continue
              if dry_run:
                  print(f'  [{brand}] DRY RUN — would POST to article: {pin.get("destination_url","")[:70]}')
                  continue

              # Guardrail: validate ALL destination links before posting.
              # Fresh articles are also checked — if the deploy failed (e.g. Vercel
              # rate limit), the article URL will 404 and we fall back to homepage
              # instead of posting a broken link to Pinterest.
              dest_url = pin.get('destination_url', '')
              if dest_url and not validate_destination_link(dest_url):
                  site = BRAND_SITE_CONFIG.get(brand, {})
                  fallback = f"{site.get('base_url', '')}/articles/"
                  print(f'  [{brand}] WARN — destination link broken ({dest_url[:60]}), falling back to articles index: {fallback}')
                  pin['destination_url'] = fallback
                  # Log to Supabase so rescue poster can redeploy + repost later
                  try:
                      db.client.table('errors').insert({
                          'error_type': 'article_url_404',
                          'error_message': f'Article URL 404 at post time: {dest_url}',
                          'context': json.dumps({'pin_id': str(pin.get("id","")), 'brand': brand}),
                          'severity': 'medium',
                      }).execute()
                  except Exception:
                      pass
              elif dest_url:
                  print(f'  [{brand}] Article URL verified ✓: {dest_url[:70]}')

              # CRITICAL: validate image_url — empty URL causes Pinterest 400
              image_url = pin.get('image_url', '') or ''
              if not image_url.startswith('http'):
                  print(f'  [{brand}] SKIP — image_url missing or invalid: "{image_url}"')
                  try:
                      db.client.table('pinterest_pins').update({
                          'status': 'failed',
                          'error_message': f'image_url missing: "{image_url}"',
                      }).eq('id', pin_id).execute()
                  except Exception:
                      try:
                          db.client.table('pinterest_pins').update({'status': 'failed'}).eq('id', pin_id).execute()
                      except Exception:
                          pass
                  log_pipeline_error('1b', brand, f'image_url missing for pin {pin_id}', severity='high')
                  continue

              destination_url = pin.get('destination_url', '')

              # ── GUARD: Block pins that link to homepage instead of an article ──
              if destination_url and '/articles/' not in destination_url and '/articles' not in destination_url:
                  site = BRAND_SITE_CONFIG.get(brand, {})
                  articles_fallback = f"{site.get('base_url', '')}/articles/"
                  print(f'  [{brand}] GUARD — destination is homepage ({destination_url[:60]}), redirecting to articles index')
                  destination_url = articles_fallback
                  pin['destination_url'] = articles_fallback

              # ── GUARD: Reject empty destination URLs ──
              if not destination_url or not destination_url.startswith('http'):
                  site = BRAND_SITE_CONFIG.get(brand, {})
                  destination_url = f"{site.get('base_url', '')}/articles/"
                  pin['destination_url'] = destination_url
                  print(f'  [{brand}] GUARD — empty destination, using articles index: {destination_url}')

              brand_slug = BRAND_SLUG.get(brand, brand)
              payload = {
                  'pin_id': str(pin_id),
                  # Hyphenated slug — matches Make.com route filters
                  # (fitness-made-easy / daily-deal-darling / menopause-planner).
                  'brand': brand_slug,
                  # Short key kept for any consumers that still expect it.
                  'brand_key': brand,
                  'title': pin.get('title', '')[:100],
                  'description': pin.get('description', '')[:500],
                  'image_url': image_url,
                  'link': destination_url,
                  'board_id': str(pin.get('board_id', '')),
              }
              print(f'  [{brand}] Posting → {destination_url[:70]}')
              print(f'  [{brand}]   board_id={payload["board_id"]}')

              # Retry logic: 3 attempts with exponential backoff
              success = False
              for attempt in range(3):
                  try:
                      if attempt == 0:
                          db.client.table('pinterest_pins').update({'status': 'posting'}).eq('id', pin_id).execute()
                      body = json.dumps(payload).encode('utf-8')
                      req = urllib.request.Request(
                          webhook_url,
                          data=body,
                          headers={'Content-Type': 'application/json'},
                          method='POST'
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          resp_body = resp.read().decode('utf-8', errors='replace')
                          print(f'  [{brand}] Webhook → HTTP {resp.status} body={len(resp_body)}B "{resp_body[:80]}"')
                      # Make.com returns 200 even when its scenario filters drop
                      # the pin. A bare "Accepted" body usually means no custom
                      # response module is attached, so we have no Pinterest
                      # pin_id to confirm the post. Log this so the silent-drop
                      # case is visible without changing posting behavior.
                      _resp_lower = resp_body.strip().lower()
                      _is_bare_accepted = _resp_lower in ('accepted', '"accepted"', 'ok', '"ok"')
                      if _is_bare_accepted:
                          try:
                              db.client.table('errors').insert({
                                  'error_type': 'webhook_bare_response',
                                  'error_message': f'Make.com returned bare "{resp_body[:30]}" for pin {pin_id} ({brand}). Add a custom response module after createPin so the scenario echoes the Pinterest pin_id back.',
                                  'context': json.dumps({'brand': brand, 'pin_id': str(pin_id), 'resp_body_len': len(resp_body)}),
                                  'severity': 'low',
                                  'created_at': datetime.now(timezone.utc).isoformat(),
                              }).execute()
                          except Exception:
                              pass
                      # Update status — try with posted_at, fallback without
                      try:
                          db.client.table('pinterest_pins').update({
                              'status': 'posted',
                              'posted_at': datetime.now(timezone.utc).isoformat()
                          }).eq('id', pin_id).execute()
                      except Exception:
                          db.client.table('pinterest_pins').update({
                              'status': 'posted'
                          }).eq('id', pin_id).execute()
                      posted_count += 1
                      posted_brands.add(brand)
                      posted_per_brand[brand] = posted_per_brand.get(brand, 0) + 1
                      success = True
                      break
                  except urllib.error.HTTPError as e:
                      err_body = e.read().decode('utf-8', errors='replace')[:200]
                      print(f'  [{brand}] Attempt {attempt+1}/3 FAILED — HTTP {e.code}: {err_body}')
                      if attempt < 2:
                          time.sleep(5 * (attempt + 1))
                      else:
                          try:
                              db.client.table('pinterest_pins').update({
                                  'status': 'failed',
                                  'error_message': f'Webhook HTTP {e.code}: {err_body}',
                              }).eq('id', pin_id).execute()
                          except Exception:
                              try:
                                  db.client.table('pinterest_pins').update({'status': 'failed'}).eq('id', pin_id).execute()
                              except Exception:
                                  pass
                          log_pipeline_error('1b', brand, f'Webhook HTTP {e.code}: {err_body}', severity='high')
                  except Exception as e:
                      print(f'  [{brand}] Attempt {attempt+1}/3 FAILED — {e}')
                      if attempt < 2:
                          time.sleep(5 * (attempt + 1))
                      else:
                          try:
                              db.client.table('pinterest_pins').update({
                                  'status': 'failed',
                                  'error_message': str(e)[:200],
                              }).eq('id', pin_id).execute()
                          except Exception:
                              try:
                                  db.client.table('pinterest_pins').update({'status': 'failed'}).eq('id', pin_id).execute()
                              except Exception:
                                  pass
                          log_pipeline_error('1b', brand, e, severity='high')

          print(f'  Posted {posted_count}/{len(rendered_pins)} pins to Pinterest')

          # Partial-post assertion: detects silent Make.com filter drops.
          # Fires when ≥2 brands ran but at least one got 0 successful posts.
          if not dry_run and len(brands_to_generate) > 1 and rendered_pins:
              brands_with_pins = {p['brand'] for p in rendered_pins}
              missed = brands_with_pins - posted_brands
              if missed:
                  _msg = (f'Partial post: brands {sorted(missed)} had rendered pins '
                          f'but none reached posted status. Webhook accepted but Make.com '
                          f'may have filtered them silently.')
                  print(f'  WARNING {_msg}')
                  log_pipeline_error('1b', 'all', _msg, severity='high')

          # ══════════════════════════════════════════════════════════════
          # PHASE 4: Verify results — log any lingering failures
          # ══════════════════════════════════════════════════════════════
          if not dry_run and rendered_pins:
              print('\n=== PHASE 4: Verification ===')
              try:
                  fresh_cutoff = (datetime.now(timezone.utc) - timedelta(minutes=30)).isoformat()
                  failed_pins = db.client.table('pinterest_pins').select('id,brand,error_message') \
                      .eq('status', 'failed').gte('created_at', fresh_cutoff).execute()
                  if failed_pins.data:
                      for fp in failed_pins.data:
                          print(f'  [{fp["brand"]}] FAILED pin {fp["id"]}: {fp.get("error_message","")[:80]}')
                  else:
                      print(f'  All pins posted successfully ({posted_count}/{len(rendered_pins)})')
              except Exception as e:
                  print(f'  Verification query failed: {e}')

          # Summary with per-brand breakdown
          print(f'\n=== Content Engine Summary ===')
          print(f'  Rendered: {len(rendered_pins)} pins')
          print(f'  Articles: {len(articles_generated)}')
          print(f'  Posted: {posted_count} pins')
          # Per-brand breakdown for tracking
          for _brand in ALL_BRANDS:
              _brand_rendered = sum(1 for p in rendered_pins if p.get('brand') == _brand)
              _brand_articles = sum(1 for a in articles_generated if a.startswith(f'{_brand}:'))
              _brand_styles = [p.get('visual_style', 'gradient') for p in rendered_pins if p.get('brand') == _brand]
              print(f'  [{_brand}] rendered={_brand_rendered} articles={_brand_articles} styles={",".join(_brand_styles) or "none"}')

          # DAILY PIN SUMMARY — one line for easy grep in GH Actions log
          _summary_parts = [f'{b}={posted_per_brand.get(b, 0)}' for b in ALL_BRANDS]
          print(f'DAILY PIN SUMMARY: {", ".join(_summary_parts)}')
          try:
              _video_summary_parts = [f'{b}={video_posted_per_brand.get(b, 0)}' for b in ALL_BRANDS]
              print(f'DAILY VIDEO SUMMARY: {", ".join(_video_summary_parts)}')
          except NameError:
              # video_posted_per_brand only defined when VIDEO_PIN_ENABLED
              pass

          # Health check: if any brand had rendered pins but posted 0 → failure email
          if not dry_run:
              _brands_with_rendered = {p['brand'] for p in rendered_pins}
              _zero_brands = sorted(b for b in _brands_with_rendered if posted_per_brand.get(b, 0) == 0)
              if _zero_brands:
                  print(f'❌ HEALTH CHECK FAILED: brands {_zero_brands} had rendered pins but 0 posted!')
                  sys.exit(1)

          if not content_ready_pins:
              print('  ⚠ No content_ready pins — pipeline idle')
          try:
              db.client.table('agent_runs').upsert({
                  'agent_name': 'content_pipeline',
                  'last_run_at': datetime.now(timezone.utc).isoformat(),
                  'status': 'success' if rendered_pins else 'idle',
                  'updated_at': datetime.now(timezone.utc).isoformat()
              }, on_conflict='agent_name').execute()
          except Exception:
              pass

          # ═══════════════��══════════════════════════════════════════════
          # FAIL-SAFE: Exit with error if zero pins were generated
          # This prevents silent "success" when the entire pipeline is broken.
          # The daily cap check (pins_today >= MAX_PINS_PER_DAY) is the only
          # legitimate reason for 0 pins — if ALL brands are capped, that's OK.
          # ══════════════════════════════════════════════════════════════
          if not dry_run and not rendered_pins and not content_ready_pins:
              # Check if we were legitimately capped
              all_capped = True
              for _brand in brands_to_generate:
                  try:
                      _tc = db.client.table('content_history') \
                          .select('id', count='exact') \
                          .eq('brand', _brand) \
                          .gte('created_at', today_str + 'T00:00:00Z') \
                          .execute()
                      _count = _tc.count if hasattr(_tc, 'count') and _tc.count is not None else len(_tc.data or [])
                      if _count < MAX_PINS_PER_DAY:
                          all_capped = False
                          print(f'  ⚠ [{_brand}] only {_count}/{MAX_PINS_PER_DAY} pins today but nothing was generated!')
                  except Exception:
                      all_capped = False
              if not all_capped:
                  # Local video strategy stages video_pending pins — that counts as success
                  try:
                      _local_video_ok = VIDEO_STRATEGY == 'local' and video_pending_staged > 0
                  except NameError:
                      _local_video_ok = False
                  if _local_video_ok:
                      print(f'  ✅ {video_pending_staged} video pins staged for local render — run successful')
                  else:
                      print('\n❌ CRITICAL: Zero pins generated but daily cap NOT reached!')
                      print('   This usually means the Gemini API or database insert is failing.')
                      print('   Check the logs above for ERROR lines.')
                      sys.exit(1)
              else:
                  print('  All brands at daily cap — legitimate idle run ✓')
          PYEOF

      - name: Deploy brand sites to Vercel
        id: deploy
        if: '!cancelled()'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_BRAND_TOKEN }}
          VERCEL_ORG: ${{ secrets.VERCEL_ORG_ID }}
          FITOVER35_PROJECT_ID: ${{ secrets.VERCEL_FITOVER35_PROJECT_ID }}
          DEALS_PROJECT_ID: ${{ secrets.VERCEL_DEALS_PROJECT_ID }}
          MENOPAUSE_PROJECT_ID: ${{ secrets.VERCEL_MENOPAUSE_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          echo "=== Deploying brand sites in parallel ==="
          rm -f /tmp/deploy_failures

          setup_vercel_project() {
            local dir="$1" project_id="$2" project_name="$3"
            mkdir -p "$dir/.vercel"
            echo "{\"projectId\":\"$project_id\",\"orgId\":\"$VERCEL_ORG\",\"projectName\":\"$project_name\"}" > "$dir/.vercel/project.json"
          }

          if [ -n "$FITOVER35_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/fitover35-website" "$FITOVER35_PROJECT_ID" "fitover35-website"
            cd $GITHUB_WORKSPACE/outputs/fitover35-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_fitness.log 2>&1 && echo "✅ fitover35 deployed" >> /tmp/vercel_fitness.log \
              || { echo "❌ fitover35 deploy failed" >> /tmp/vercel_fitness.log; echo "fitness" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ fitover35: VERCEL_FITOVER35_PROJECT_ID not set, skipping"
          fi

          if [ -n "$DEALS_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/dailydealdarling-website" "$DEALS_PROJECT_ID" "dailydealdarling-website"
            cd $GITHUB_WORKSPACE/outputs/dailydealdarling-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_deals.log 2>&1 && echo "✅ dailydealdarling deployed" >> /tmp/vercel_deals.log \
              || { echo "❌ deals deploy failed" >> /tmp/vercel_deals.log; echo "deals" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ dailydealdarling: VERCEL_DEALS_PROJECT_ID not set, skipping"
          fi

          if [ -n "$MENOPAUSE_PROJECT_ID" ]; then
            setup_vercel_project "$GITHUB_WORKSPACE/outputs/menopause-planner-website" "$MENOPAUSE_PROJECT_ID" "menopause-planner-website"
            cd $GITHUB_WORKSPACE/outputs/menopause-planner-website
            vercel deploy --prod --yes --token "$VERCEL_TOKEN" . \
              > /tmp/vercel_menopause.log 2>&1 && echo "✅ menopause-planner deployed" >> /tmp/vercel_menopause.log \
              || { echo "❌ menopause deploy failed" >> /tmp/vercel_menopause.log; echo "menopause" >> /tmp/deploy_failures; } &
            cd $GITHUB_WORKSPACE
          else
            echo "⏭ menopause-planner: VERCEL_MENOPAUSE_PROJECT_ID not set, skipping"
          fi

          echo "Waiting for parallel deploys to complete..."
          wait
          echo "=== Deploy logs ==="
          cat /tmp/vercel_*.log 2>/dev/null || true

          # Detect failures and expose to subsequent steps
          if [ -f /tmp/deploy_failures ]; then
            FAILED_BRANDS=$(cat /tmp/deploy_failures | tr '\n' ',' | sed 's/,$//')
            echo "deploy_failed=true" >> $GITHUB_OUTPUT
            echo "failed_brands=$FAILED_BRANDS" >> $GITHUB_OUTPUT
            echo "⚠️ DEPLOY FAILED for: $FAILED_BRANDS"
            echo "Articles committed but NOT live — pins will use homepage fallback"
          else
            echo "deploy_failed=false" >> $GITHUB_OUTPUT
            echo "failed_brands=" >> $GITHUB_OUTPUT
          fi

      - name: Update pin URLs if deploy failed
        if: steps.deploy.outputs.deploy_failed == 'true' && !cancelled()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FAILED_BRANDS: ${{ steps.deploy.outputs.failed_brands }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys
          from datetime import datetime, timezone, timedelta
          from urllib.request import Request, urlopen

          SUPABASE_URL = os.environ.get('SUPABASE_URL', '')
          SUPABASE_KEY = os.environ.get('SUPABASE_KEY', '')
          FAILED_BRANDS = os.environ.get('FAILED_BRANDS', '').split(',')

          BRAND_HOMEPAGES = {
              'fitness': 'https://fitover35.com',
              'deals': 'https://www.dailydealdarling.com',
              'menopause': 'https://menopause-planner-website.vercel.app',
          }

          if not SUPABASE_URL or not SUPABASE_KEY:
              print('No Supabase creds — skipping URL fix')
              sys.exit(0)

          cutoff = (datetime.now(timezone.utc) - timedelta(minutes=30)).strftime('%Y-%m-%dT%H:%M:%SZ')
          headers = {
              'apikey': SUPABASE_KEY,
              'Authorization': f'Bearer {SUPABASE_KEY}',
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
          }

          for brand in FAILED_BRANDS:
              brand = brand.strip()
              if not brand or brand not in BRAND_HOMEPAGES:
                  continue
              homepage = BRAND_HOMEPAGES[brand]
              articles_url = f'{homepage}/articles/'
              print(f'[{brand}] Deploy failed — updating recent article-linked pins to articles index: {articles_url}')

              # Update pins that were just posted with broken article URLs to articles index (NOT homepage)
              url = f'{SUPABASE_URL}/rest/v1/pinterest_pins?brand=eq.{brand}&status=in.(posting,posted)&created_at=gte.{cutoff}&destination_url=like.*articles*'
              body = json.dumps({'destination_url': articles_url}).encode()
              req = Request(url, data=body, headers=headers, method='PATCH')
              try:
                  with urlopen(req, timeout=15) as resp:
                      result = json.loads(resp.read().decode())
                      print(f'  Updated {len(result)} pins to homepage fallback')
              except Exception as e:
                  print(f'  Failed to update pins: {e}')

              # Log deploy failure to errors table
              err_url = f'{SUPABASE_URL}/rest/v1/errors'
              err_body = json.dumps({
                  'error_type': 'deploy_failure',
                  'error_message': f'Vercel deploy failed for {brand} — likely 100/day rate limit hit',
                  'context': json.dumps({'brand': brand, 'workflow': 'content-engine'}),
                  'severity': 'high',
              }).encode()
              req = Request(err_url, data=err_body, headers=headers, method='POST')
              try:
                  with urlopen(req, timeout=10) as resp:
                      pass
              except Exception:
                  pass
          PYEOF

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-engine-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
