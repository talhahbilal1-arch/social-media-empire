name: Daily Video Generation

on:
  schedule:
    # 10 AM PST daily (6 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      brands:
        description: 'Comma-separated brands (fitover35,deals,menopause) or "all"'
        default: 'all'
        type: string
      count:
        description: 'Videos per brand'
        default: '1'
        type: string
      skip_post:
        description: 'Render only, skip posting'
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion-videos/package-lock.json

      - name: Install Remotion dependencies
        run: cd remotion-videos && npm ci

      - name: Ensure Chrome for Remotion
        run: cd remotion-videos && npx remotion browser ensure

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Generate videos — fitover35
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          BRANDS_INPUT: ${{ inputs.brands || 'all' }}
          COUNT_INPUT: ${{ inputs.count || '1' }}
          SKIP_POST_INPUT: ${{ inputs.skip_post || 'false' }}
        run: |
          if [[ "$BRANDS_INPUT" != "all" && "$BRANDS_INPUT" != *"fitover35"* ]]; then
            echo "Skipping fitover35 (not in brands input)"
            exit 0
          fi
          SKIP_FLAG=""
          if [ "$SKIP_POST_INPUT" = "true" ]; then SKIP_FLAG="--skip-post"; fi
          python3 -m video_pipeline.generate \
            --brand fitover35 \
            --count "$COUNT_INPUT" \
            --format pinterest \
            $SKIP_FLAG

      - name: Generate videos — deals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          BRANDS_INPUT: ${{ inputs.brands || 'all' }}
          COUNT_INPUT: ${{ inputs.count || '1' }}
          SKIP_POST_INPUT: ${{ inputs.skip_post || 'false' }}
        run: |
          if [[ "$BRANDS_INPUT" != "all" && "$BRANDS_INPUT" != *"deals"* ]]; then
            echo "Skipping deals (not in brands input)"
            exit 0
          fi
          SKIP_FLAG=""
          if [ "$SKIP_POST_INPUT" = "true" ]; then SKIP_FLAG="--skip-post"; fi
          python3 -m video_pipeline.generate \
            --brand deals \
            --count "$COUNT_INPUT" \
            --format pinterest \
            $SKIP_FLAG

      - name: Generate videos — menopause
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          BRANDS_INPUT: ${{ inputs.brands || 'all' }}
          COUNT_INPUT: ${{ inputs.count || '1' }}
          SKIP_POST_INPUT: ${{ inputs.skip_post || 'false' }}
        run: |
          if [[ "$BRANDS_INPUT" != "all" && "$BRANDS_INPUT" != *"menopause"* ]]; then
            echo "Skipping menopause (not in brands input)"
            exit 0
          fi
          SKIP_FLAG=""
          if [ "$SKIP_POST_INPUT" = "true" ]; then SKIP_FLAG="--skip-post"; fi
          python3 -m video_pipeline.generate \
            --brand menopause \
            --count "$COUNT_INPUT" \
            --format pinterest \
            $SKIP_FLAG

      - name: Commit pending posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d output/_pending_posts ] && compgen -G "output/_pending_posts/*.json" > /dev/null; then
            git add output/_pending_posts/
            git commit -m "feat: add pending pinterest video posts $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No pending posts to commit."
          fi

      - name: Upload generated videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: |
            output/*.mp4
            output/_pending_posts/*.json
          retention-days: 7
          if-no-files-found: ignore
