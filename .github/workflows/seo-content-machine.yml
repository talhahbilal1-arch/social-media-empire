name: SEO Content Machine

on:
  schedule:
    - cron: '0 16 * * 1,3,5'  # Mon/Wed/Fri 8AM PST
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  seo-content-machine:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SEO Content Machine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 << 'PYEOF'
          import sys
          import time

          sys.path.insert(0, '.')

          MAX_ATTEMPTS = 2
          last_error = None

          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  print(f"SEO content machine attempt {attempt}/{MAX_ATTEMPTS}")
                  import video_automation.seo_content_machine as seo_machine
                  seo_machine.main()
                  print("SEO content machine completed.")
                  break
              except Exception as e:
                  last_error = e
                  print(f"Attempt {attempt} failed: {e}")
                  import traceback; traceback.print_exc()
                  if attempt < MAX_ATTEMPTS:
                      print("Retrying in 60s...")
                      time.sleep(60)

          if last_error and attempt == MAX_ATTEMPTS:
              print(f"SEO machine failed after {MAX_ATTEMPTS} attempts: {last_error}")
              sys.exit(1)
          PYEOF

      - name: Commit and push new articles + internal links
        run: |
          git config user.name "SEO Content Machine"
          git config user.email "bot@fitover35.com"
          git add outputs/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "content: SEO machine — new articles + internal links ${TODAY}"
            git pull --rebase origin main
            git push
          fi
