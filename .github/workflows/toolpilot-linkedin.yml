name: PilotTools LinkedIn Automation

on:
  schedule:
    # Mon/Wed/Fri at 6PM UTC (10AM PST)
    - cron: '0 18 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-linkedin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ai-tools-hub

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-tools-hub/package-lock.json

      - run: npm ci

      - name: Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/linkedin-poster.js --count 1
        continue-on-error: true

      - name: Commit history
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-tools-hub/config/linkedin-history.json
          git diff --staged --quiet || git commit -m "linkedin: auto-post $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
