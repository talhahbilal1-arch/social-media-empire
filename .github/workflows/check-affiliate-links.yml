name: Check Affiliate Links

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run link checker
        id: check
        env:
          RAINFOREST_API_KEY: ${{ secrets.RAINFOREST_API_KEY }}
        run: |
          python automation/links/check_links.py --source outputs/fitover35-website/ outputs/dailydealdarling-website/
        continue-on-error: true

      - name: Create issue if broken links found
        if: steps.check.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken Affiliate Links Detected"
          content-filepath: automation/links/reports/github_issue_body.md
          labels: |
            affiliate-links
            automated

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: automation/links/reports/
          retention-days: 30
