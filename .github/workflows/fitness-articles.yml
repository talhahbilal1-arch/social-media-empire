name: Fitness & Deals Articles

on:
  schedule:
    # Daily at 11 PM PST (7 AM UTC), Mon-Fri
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand (fitover35 or deals)'
        type: choice
        options:
          - fitover35
          - deals
          - both
        default: fitover35
      keyword:
        description: 'Target keyword (optional - auto-select if empty)'
        type: string
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-fitover35-article:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run for fitover35 (on schedule, or when manually triggered for fitover35/both)
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.brand == 'fitover35' ||
      github.event.inputs.brand == 'both'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select keyword
        id: keyword
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            KEYWORD="${{ github.event.inputs.keyword }}"
            SLUG=$(echo "$KEYWORD" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | cut -c1-60)
            FILENAME="${SLUG}.html"
            echo "keyword=$KEYWORD" >> $GITHUB_OUTPUT
            echo "category=auto" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          else
            python automation/articles/fitover35_keywords.py \
              --mark-used \
              --state-file fitover35_keyword_state.json
          fi

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          KEYWORD="${{ steps.keyword.outputs.keyword }}"
          CATEGORY="${{ steps.keyword.outputs.category }}"
          SLUG="${{ steps.keyword.outputs.slug }}"
          FILENAME="${{ steps.keyword.outputs.filename }}"

          echo "Generating FitOver35 article for: $KEYWORD"

          python automation/articles/fitover35_article_generator.py \
            --keyword "$KEYWORD" \
            --category "$CATEGORY" \
            --output "outputs/fitover35-website/articles/$FILENAME"

      - name: Update blog listing
        run: |
          python automation/articles/update_blog_index.py \
            --brand fitover35 \
            --article-path "articles/${{ steps.keyword.outputs.filename }}" \
            --title "${{ steps.generate.outputs.title }}" \
            --category "${{ steps.generate.outputs.category }}" \
            --excerpt "${{ steps.generate.outputs.excerpt }}" \
            --read-time "${{ steps.generate.outputs.read_time }}" \
            --image-url "${{ steps.generate.outputs.hero_image }}"

      - name: Commit and push
        run: |
          git config user.name "FitOver35 Bot"
          git config user.email "bot@fitover35.com"
          git add outputs/fitover35-website/articles/
          git add outputs/fitover35-website/blog.html
          git add fitover35_keyword_state.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TITLE="${{ steps.generate.outputs.title }}"
            git commit -m "Publish FitOver35 article: ${TITLE}"
            git push
          fi

      - name: Summary
        run: |
          echo "## FitOver35 Article Published" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** ${{ steps.generate.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Keyword:** ${{ steps.keyword.outputs.keyword }}" >> $GITHUB_STEP_SUMMARY

  generate-deals-article:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run on Mon/Wed/Fri via schedule or when manually triggered for deals/both
    if: >
      github.event.inputs.brand == 'deals' ||
      github.event.inputs.brand == 'both' ||
      github.event_name == 'schedule'

    steps:
      - name: Check if today is Mon/Wed/Fri (skip Tue/Thu for deals)
        id: day_check
        run: |
          DAY=$(date -u +%u)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DAY" != "1" ] && [ "$DAY" != "3" ] && [ "$DAY" != "5" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Today is day $DAY — skipping deals (only Mon/Wed/Fri)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.day_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.day_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: steps.day_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate deals article
        if: steps.day_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import sys, os, json
          sys.path.insert(0, '.')

          from database.supabase_client import get_supabase_client
          db = get_supabase_client()

          # Use the same article generator as fitness, but for deals brand
          try:
              from video_automation.article_generator import generate_articles_for_weekly_calendar, publish_article_to_website

              result = db.client.table('weekly_calendar').select('calendar_data, trends_data') \
                  .eq('brand', 'deals').order('created_at', desc=True).limit(1).execute()

              if result.data:
                  calendar = result.data[0].get('calendar_data', {})
                  if isinstance(calendar, str):
                      calendar = json.loads(calendar)

                  trends_data = result.data[0].get('trends_data')
                  if trends_data:
                      if isinstance(trends_data, str):
                          trends_data = json.loads(trends_data)
                      calendar['trending_topics'] = trends_data.get('trending_topics', [])

                  articles = generate_articles_for_weekly_calendar(calendar, 'daily_deal_darling', db.client)
                  for slug, content in articles.items():
                      if content:
                          publish_article_to_website(content, 'daily_deal_darling', slug)
                          print(f'Published deals article: {slug}')
              else:
                  print('No weekly calendar for deals — skipping article generation')
                  print('Run trend-discovery first to populate the calendar')
          except ImportError:
              print('article_generator not available — skipping')
          except Exception as e:
              print(f'Deals article generation error: {e}')
          "

      - name: Summary
        if: steps.day_check.outputs.skip != 'true'
        run: |
          echo "## Daily Deal Darling Article" >> $GITHUB_STEP_SUMMARY
          echo "Deals article generated from weekly calendar" >> $GITHUB_STEP_SUMMARY
