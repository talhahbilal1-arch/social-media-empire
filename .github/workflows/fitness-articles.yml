name: Fitness & Deals Articles

on:
  schedule:
    # Daily at 11 PM PST (7 AM UTC), Mon-Fri
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand (fitover35 or deals)'
        type: choice
        options:
          - fitover35
          - deals
          - both
        default: fitover35
      keyword:
        description: 'Target keyword (optional - auto-select if empty)'
        type: string
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-fitover35-article:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Always run for fitover35
    if: >
      github.event.inputs.brand != 'deals' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select keyword
        id: keyword
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
        run: |
          if [ -n "$INPUT_KEYWORD" ]; then
            SLUG=$(echo "$INPUT_KEYWORD" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | cut -c1-60)
            FILENAME="${SLUG}.html"
            echo "keyword=$INPUT_KEYWORD" >> $GITHUB_OUTPUT
            echo "category=auto" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          else
            # trending_topic_selector: queries Supabase daily_trending first,
            # falls back to static keyword list if no trending data for today.
            python3 automation/articles/trending_topic_selector.py \
              --brand fitness \
              --mark-used \
              --state-file fitover35_keyword_state.json
          fi

      - name: Generate article
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ARTICLE_KEYWORD: ${{ steps.keyword.outputs.keyword }}
          ARTICLE_CATEGORY: ${{ steps.keyword.outputs.category }}
          ARTICLE_FILENAME: ${{ steps.keyword.outputs.filename }}
        run: |
          echo "Generating FitOver35 article for: $ARTICLE_KEYWORD"
          python3 automation/articles/fitover35_article_generator.py \
            --keyword "$ARTICLE_KEYWORD" \
            --category "$ARTICLE_CATEGORY" \
            --output "outputs/fitover35-website/articles/$ARTICLE_FILENAME"

      - name: Update blog listing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ARTICLE_PATH: ${{ steps.keyword.outputs.filename }}
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
          ARTICLE_CATEGORY: ${{ steps.generate.outputs.category }}
          ARTICLE_EXCERPT: ${{ steps.generate.outputs.excerpt }}
          ARTICLE_READ_TIME: ${{ steps.generate.outputs.read_time }}
          ARTICLE_IMAGE: ${{ steps.generate.outputs.hero_image }}
        run: |
          python3 automation/articles/update_blog_index.py \
            --brand fitover35 \
            --article-path "articles/$ARTICLE_PATH" \
            --title "$ARTICLE_TITLE" \
            --category "$ARTICLE_CATEGORY" \
            --excerpt "$ARTICLE_EXCERPT" \
            --read-time "$ARTICLE_READ_TIME" \
            --image-url "$ARTICLE_IMAGE"

      - name: Commit and push
        env:
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
        run: |
          git config user.name "FitOver35 Bot"
          git config user.email "bot@fitover35.com"
          git add outputs/fitover35-website/articles/
          git add outputs/fitover35-website/blog.html
          git add fitover35_keyword_state.json trending_context.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish FitOver35 article: ${ARTICLE_TITLE}"
            git pull --rebase origin main
            git push
          fi

      - name: Summary
        env:
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
          ARTICLE_KEYWORD: ${{ steps.keyword.outputs.keyword }}
        run: |
          echo "## FitOver35 Article Published" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** $ARTICLE_TITLE" >> $GITHUB_STEP_SUMMARY
          echo "**Keyword:** $ARTICLE_KEYWORD" >> $GITHUB_STEP_SUMMARY

  generate-deals-article:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run when manually triggered for deals
    if: >
      github.event.inputs.brand == 'deals' ||
      github.event.inputs.brand == 'both'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select keyword
        id: keyword
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
        run: |
          if [ -n "$INPUT_KEYWORD" ]; then
            SLUG=$(echo "$INPUT_KEYWORD" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | cut -c1-60)
            echo "keyword=$INPUT_KEYWORD" >> $GITHUB_OUTPUT
            echo "category=auto" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "filename=${SLUG}.html" >> $GITHUB_OUTPUT
          else
            python3 automation/articles/trending_topic_selector.py \
              --brand deals \
              --mark-used \
              --state-file dailydealdarling_keyword_state.json
          fi

      - name: Generate deals article
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ARTICLE_KEYWORD: ${{ steps.keyword.outputs.keyword }}
          ARTICLE_CATEGORY: ${{ steps.keyword.outputs.category }}
          ARTICLE_FILENAME: ${{ steps.keyword.outputs.filename }}
        run: |
          python3 automation/articles/dailydealdarling_article_generator.py \
            --keyword "$ARTICLE_KEYWORD" \
            --category "$ARTICLE_CATEGORY" \
            --output "outputs/dailydealdarling-website/articles/$ARTICLE_FILENAME"

      - name: Update blog listing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ARTICLE_PATH: ${{ steps.keyword.outputs.filename }}
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
          ARTICLE_CATEGORY: ${{ steps.generate.outputs.category }}
          ARTICLE_EXCERPT: ${{ steps.generate.outputs.excerpt }}
          ARTICLE_READ_TIME: ${{ steps.generate.outputs.read_time }}
          ARTICLE_IMAGE: ${{ steps.generate.outputs.hero_image }}
        run: |
          python3 automation/articles/update_blog_index.py \
            --brand deals \
            --article-path "articles/$ARTICLE_PATH" \
            --title "$ARTICLE_TITLE" \
            --category "$ARTICLE_CATEGORY" \
            --excerpt "$ARTICLE_EXCERPT" \
            --read-time "$ARTICLE_READ_TIME" \
            --image-url "$ARTICLE_IMAGE"

      - name: Commit and push
        env:
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
        run: |
          git config user.name "DailyDealDarling Bot"
          git config user.email "bot@dailydealdarling.com"
          git add outputs/dailydealdarling-website/articles/
          git add outputs/dailydealdarling-website/blog.html
          git add dailydealdarling_keyword_state.json trending_context.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish DailyDealDarling article: ${ARTICLE_TITLE}"
            git pull --rebase origin main
            git push
          fi

      - name: Summary
        env:
          ARTICLE_TITLE: ${{ steps.generate.outputs.title }}
          ARTICLE_KEYWORD: ${{ steps.keyword.outputs.keyword }}
        run: |
          echo "## Daily Deal Darling Article Published" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** $ARTICLE_TITLE" >> $GITHUB_STEP_SUMMARY
          echo "**Keyword:** $ARTICLE_KEYWORD" >> $GITHUB_STEP_SUMMARY
