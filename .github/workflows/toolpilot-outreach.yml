name: PilotTools Backlink Outreach

on:
  schedule:
    # Weekly on Monday at 3PM UTC (7AM PST)
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      type:
        description: 'Outreach type: testimonial, partnership, feature'
        required: false
        default: 'testimonial'
      count:
        description: 'Number of outreach emails (1-10)'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  send-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ai-tools-hub

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-tools-hub/package-lock.json

      - run: npm ci

      - name: Send outreach emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTREACH_TYPE: ${{ github.event.inputs.type || 'testimonial' }}
          OUTREACH_COUNT: ${{ github.event.inputs.count || '5' }}
        run: node scripts/outreach-automator.js --type "$OUTREACH_TYPE" --count "$OUTREACH_COUNT" --send
        continue-on-error: true

      - name: Commit outreach log
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-tools-hub/config/outreach-log.json
          git diff --staged --quiet || git commit -m "outreach: weekly batch $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
