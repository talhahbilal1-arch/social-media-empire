name: Validate

# Runs on every push AND on a daily schedule to catch drift
on:
  push:
    paths:
      - '**.py'
      - '**.json'
      - '**.sql'
      - 'requirements.txt'
      - '.github/workflows/**'
  schedule:
    # Daily at 8 AM UTC — catches config drift even without code changes
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run validators
        id: validate
        run: |
          python -m monitoring.validators --json > validation_results.json 2>&1 || true
          cat validation_results.json

          # Parse results for summary
          python3 << 'PYEOF'
          import json, os, sys

          try:
              with open('validation_results.json') as f:
                  results = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError):
              print("Could not parse validation results")
              sys.exit(1)

          errors = 0
          warnings = 0
          summary_lines = []

          for r in results:
              status = "PASS" if r["ok"] else "FAIL"
              summary_lines.append(f"{status}: {r['name']} ({len(r['errors'])} errors, {len(r['warnings'])} warnings)")
              errors += len(r["errors"])
              warnings += len(r["warnings"])

              for e in r["errors"]:
                  print(f"::error title={r['name']}::{e}")
              for w in r["warnings"]:
                  print(f"::warning title={r['name']}::{w}")

          # Write step summary
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write("## Validation Results\n\n")
              for line in summary_lines:
                  emoji = "✅" if line.startswith("PASS") else "❌"
                  f.write(f"- {emoji} {line}\n")
              f.write(f"\n**Total: {errors} errors, {warnings} warnings**\n")

          if errors > 0:
              print(f"\n{errors} validation error(s) found — failing build")
              sys.exit(1)
          else:
              print(f"\nAll validations passed ({warnings} warnings)")
          PYEOF

      - name: Python syntax check
        if: always()
        run: |
          python -m py_compile monitoring/validators.py
          echo "Validators module compiles OK"
