name: PilotTools Content Repurposer

on:
  schedule:
    # Daily at 8AM UTC (12AM PST) - runs after content generation
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repurpose-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ai-tools-hub

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-tools-hub/package-lock.json

      - run: npm ci

      - name: Repurpose latest content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/content-repurposer.js --count 3
        continue-on-error: true

      - name: Post from social queue
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/twitter-poster.js --from-queue --count 1
        continue-on-error: true

      - name: Commit tracking files
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-tools-hub/config/social-queue.json ai-tools-hub/config/twitter-history.json
          git diff --staged --quiet || git commit -m "social: repurpose + post $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
