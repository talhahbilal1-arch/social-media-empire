<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Menopause Symptom Tracker | The Menopause Planner</title>
<meta name="description" content="Track your symptoms, take back control. A free printable tracker to help you understand patterns and prepare for doctor visits.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#FAF7F0;color:#3D3D3D;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero{max-width:560px;width:100%;padding:40px 24px;text-align:center}
h1{font-size:2.2rem;color:#6B705C;margin-bottom:12px;line-height:1.2}
.subhead{font-size:1.1rem;color:#6B6B6B;margin-bottom:36px;line-height:1.5}
.benefits{list-style:none;margin-bottom:36px;text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.benefits li{padding:12px 0;border-bottom:1px solid #EDE0D4;font-size:1rem;display:flex;align-items:center;gap:12px}
.benefits li::before{content:'✓';color:#DDBEA9;font-weight:700;font-size:1.2rem;flex-shrink:0}
.form-wrap{margin-bottom:24px}
.form-wrap input[type="email"]{width:100%;padding:14px 16px;border:2px solid #A5A58D;border-radius:8px;font-size:16px;background:#fff;color:#3D3D3D;margin-bottom:12px}
.form-wrap input[type="email"]::placeholder{color:#999}
.form-wrap input[type="email"]:focus{outline:none;border-color:#6B705C}
.form-wrap button{width:100%;padding:16px;background:#6B705C;color:#FAF7F0;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;transition:background .2s}
.form-wrap button:hover{background:#7d8270}
.trust{font-size:0.9rem;color:#6B6B6B}
@media(max-width:480px){h1{font-size:1.6rem}.hero{padding:32px 16px}}
</style>
</head>
<body>
<div class="hero">
  <h1>Track Your Symptoms, Take Back Control</h1>
  <p class="subhead">A free printable tracker to help you understand patterns and prepare for doctor visits</p>
  <ul class="benefits">
    <li>Daily symptom logging</li>
    <li>Pattern recognition guide</li>
    <li>Doctor visit prep sheet</li>
  </ul>
  <form class="form-wrap" action="https://app.kit.com/forms/MENOPAUSE_FORM_ID/subscriptions" method="post">
    <input type="email" name="email_address" placeholder="Enter your email" required>
    <button type="submit">Download My Free Tracker</button>
  </form>
  <p class="trust">Trusted by women navigating menopause with confidence</p>
</div>
</body>
</html>
