<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free 7-Day High-Protein Meal Plan | FitOver35</title>
<meta name="description" content="Get your free 7-day high-protein meal plan built for busy men over 35. Meal prep under 30 min, 150g+ protein daily, full grocery list included.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero{max-width:560px;width:100%;padding:40px 24px;text-align:center}
h1{font-size:2.2rem;color:#C8A96E;margin-bottom:12px;line-height:1.2}
.subhead{font-size:1.1rem;color:#ccc;margin-bottom:36px;line-height:1.5}
.benefits{list-style:none;margin-bottom:36px;text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.benefits li{padding:12px 0;border-bottom:1px solid #2a2a4e;font-size:1rem;display:flex;align-items:center;gap:12px}
.benefits li::before{content:'✓';color:#C8A96E;font-weight:700;font-size:1.2rem;flex-shrink:0}
.form-wrap{margin-bottom:24px}
.form-wrap input[type="email"]{width:100%;padding:14px 16px;border:2px solid #C8A96E;border-radius:8px;font-size:16px;background:#111;color:#fff;margin-bottom:12px}
.form-wrap input[type="email"]::placeholder{color:#888}
.form-wrap input[type="email"]:focus{outline:none;border-color:#e0c080}
.form-wrap button{width:100%;padding:16px;background:#C8A96E;color:#1a1a2e;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;transition:background .2s}
.form-wrap button:hover{background:#e0c080}
.trust{font-size:0.9rem;color:#888}
@media(max-width:480px){h1{font-size:1.6rem}.hero{padding:32px 16px}}
</style>
</head>
<body>
<div class="hero">
  <h1>Your Free 7-Day High-Protein Meal Plan</h1>
  <p class="subhead">Built for busy men over 35 who want to build muscle without spending hours in the kitchen</p>
  <ul class="benefits">
    <li>Meal prep under 30 minutes</li>
    <li>150g+ protein daily</li>
    <li>Full grocery list included</li>
  </ul>
  <form class="form-wrap" action="https://app.kit.com/forms/FITOVER35_FORM_ID/subscriptions" method="post">
    <input type="email" name="email_address" placeholder="Enter your email" required>
    <button type="submit">Get My Free Plan</button>
  </form>
  <p class="trust">Join 2,000+ men transforming their nutrition</p>
</div>
</body>
</html>
